            const getRankedInstructorOptions = (targetCourse, excludedInstructors = [], slotType = 'any', targetModalidade = 'Aperfeiçoamento', pendingData = [], customPool = null, evaluationDate = null, baseDataOverride = null) => {
    const stats = {};
    const isTecnica = targetModalidade === 'Técnica';
    const pool = customPool || uniqueInstrutores;
    
    const normalizedExcludes = (Array.isArray(excludedInstructors) ? excludedInstructors : [excludedInstructors])
        .filter(Boolean)
        .map(normalizeText);

    // Bloqueia espaços em branco e o "Fantasma", permitindo apenas nomes reais
    let allowedInstructors = pool.filter(name => {
        const n = normalizeText(name || '');
        return n.length > 1 && !n.includes('nao atribuido') && !blockedInstructors.includes(n);
    });
    if (isTecnica) {
        allowedInstructors = allowedInstructors.filter(name => tecnicaWhitelist.includes(normalizeText(name)));
    }

    allowedInstructors.forEach(name => {
        if (normalizeText(name).includes('nao atribuido')) return;
        stats[name] = { nome: name, totalAlunos: 0, totalTurmas: 0, turmasDoCurso: 0, countAsInst1: 0, countAsInst2: 0 };
    });

    const normalizedTarget = normalizeText(targetCourse);
    const allData = baseDataOverride !== null ? [...baseDataOverride, ...pendingData] : [...data, ...pendingData];
    
    const evalDateStr = (evaluationDate && evaluationDate.length === 10) ? evaluationDate : viewDate;
    const targetDateObj = new Date(evalDateStr + 'T00:00:00'); 

    allData.forEach(row => {
        const i1 = getCanonical(safeString(row.instrutor1));
        const i2 = getCanonical(safeString(row.instrutor2));
        if (i1 && stats[i1]) stats[i1].countAsInst1++;
        if (i2 && stats[i2]) stats[i2].countAsInst2++;

        const info = getActiveInfoOnDate(row, targetDateObj);
// O '!info' impede o sistema de crashar caso alguma turma nova não tenha dados suficientes para gerar o status
if (!info || info.status === 'Finalizado' || info.status === 'Agendado') return; 

        const activeInst = info.inst;
        if (activeInst && stats[activeInst]) {
            stats[activeInst].totalAlunos += parseInt(row.alunos) || 0;
            stats[activeInst].totalTurmas += 1;
            if (normalizeText(row.curso) === normalizedTarget && getSafeModalidade(row) === targetModalidade) {
                stats[activeInst].turmasDoCurso += 1;
            }
        }
    });

    const availableStats = Object.values(stats).filter(i => !normalizedExcludes.includes(normalizeText(i.nome)));
    
    // === NOVA LÓGICA: GRAVIDADE DA MÉDIA GLOBAL ===
    const totalInsts = availableStats.length;
    const somaAlunos = availableStats.reduce((acc, i) => acc + i.totalAlunos, 0);
    const somaTurmas = availableStats.reduce((acc, i) => acc + i.totalTurmas, 0);
    
    // Descobre a média exata de alunos e turmas da equipe
    const mediaAlunos = totalInsts > 0 ? somaAlunos / totalInsts : 0;
    const mediaTurmas = totalInsts > 0 ? somaTurmas / totalInsts : 0;

    return availableStats.map(inst => {
        // A pontuação base agora é a distância do instrutor para a média. 
        // Zero é perfeito. Negativo é prioridade. Positivo vai pro fim da fila.
        let score = inst.totalAlunos - mediaAlunos; 
        
        let tip = `[${inst.totalAlunos} Alunos | ${inst.totalTurmas} Turmas]`;
        let type = "good";
        let emoji = "✅";
        let flags = [];

        // 1º REGRA (PISO DE PROTEÇÃO): Forte prioridade para não deixar ninguém abaixo de 200
        if (inst.totalAlunos < BALANCE_LIMITS.min) {
            score -= 100000; // Puxa o instrutor urgentemente para o topo da lista
            emoji = "🚀";
            flags.push(`🚀 Piso: < ${BALANCE_LIMITS.min} Alunos`);
        }

        // 2º REGRA (ELASTICIDADE DE ALUNOS): Atração magnética para a Média
        if (inst.totalAlunos > mediaAlunos) {
            // Sofre uma penalidade suave progressiva (quanto mais distante da média, menos recebe turmas)
            const diff = inst.totalAlunos - mediaAlunos;
            score += diff * 200; 
            if (diff > 20) {
                if(emoji === "✅") emoji = "🟡"; type = "warning";
                flags.push(`🟡 Acima da Média`);
            }
        } else if (inst.totalAlunos < mediaAlunos) {
            // Ganha bônus progressivo para subir até alcançar a média
            const diff = mediaAlunos - inst.totalAlunos;
            score -= diff * 200;
        }

        // 3º REGRA (ELASTICIDADE DE TURMAS): Atração magnética para a Média de Turmas
        if (inst.totalTurmas > mediaTurmas) {
            const diffTurmas = inst.totalTurmas - mediaTurmas;
            score += diffTurmas * 3000; // Penalidade flexível por ter mais turmas que a média
            if (diffTurmas >= 1.5) {
                if(emoji === "✅" || emoji === "🟡") emoji = "⚖️"; type = "warning";
                flags.push(`⚖️ Acima da Média de Turmas`);
            }
        } else if (inst.totalTurmas < mediaTurmas) {
            const diffTurmas = mediaTurmas - inst.totalTurmas;
            score -= diffTurmas * 3000; 
            flags.push(`⭐ Poucas Turmas`);
        }

        // 4º REGRA: ROTAÇÃO PARA INSTRUTOR 1 (Forçar variação)
        if (slotType === 'instrutor1') {
            score += inst.countAsInst1 * 15000;
            if (inst.countAsInst1 > 0) flags.push(`🔄 Rotação P1 (${inst.countAsInst1}x)`);
        }

        // Regras de Especialidade / Diversificação
        if (inst.turmasDoCurso >= 3) {
            score += 5000; 
            if(emoji !== "🚀") { emoji = "⚠️"; type = "warning"; }
            flags.push(`⚠️ Concentração (${inst.turmasDoCurso}x no curso)`);
        } else if (inst.turmasDoCurso >= 2) {
            score += 1000;
        } else if (inst.turmasDoCurso === 0) {
            score -= 500; 
            flags.push(`⭐ Novo no Curso`);
        }

        // TETO OPERACIONAL ABSOLUTO (Proteção final contra Burnout)
        if (inst.totalAlunos >= BALANCE_LIMITS.hardMax) {
            score += 5000000; emoji = "🔴"; type = "bad"; 
            flags.push(`🔴 Limite Operacional Crítico`);
        } else if (inst.totalAlunos >= BALANCE_LIMITS.max) {
            score += 50000; emoji = "🔴"; type = "bad"; 
            flags.push(`🔴 Carga Máxima`);
        }

        if (flags.length > 0) tip += " - " + flags.join(" | ");

        return { ...inst, score, label: `(${inst.totalAlunos} al / ${inst.totalTurmas} trm)`, emoji, type, tip };
    }).sort((a,b) => a.score - b.score);
};
// === IA: REBALANCEAMENTO FUTURO DE INSTRUTORES ===
const BALANCE_LIMITS = {
    min: 200,
    ideal: 235,
    max: 270,
    hardMax: 280,
    maxGap: 40,       // Pode deixar aqui, a nova regra de Média é mais inteligente que ele
    maxSameCourse: 3,
    monthsAhead: 6,   // <-- CRÍTICO: Permite que a IA enxergue até dezembro
    maxMoves: 1500    // <-- CRÍTICO: Dá energia suficiente para a IA distribuir turmas grandes
};

const isBlockedInstructorName = (nome) => {
    return blockedInstructors.includes(normalizeText(nome));
};

const isTecnicaInstructor = (nome) => {
    return tecnicaWhitelist.includes(normalizeText(nome));
};

const getBalanceRolesForClass = (turma) => {
    return getClassInstructorRoles(turma);
};

const getBalanceDateStr = (dateObj) => {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
};

const getActiveRoleOnBalanceDate = (row, dateStr) => {
    const dateObj = new Date(dateStr + 'T00:00:00');
    const info = getActiveInfoOnDate(row, dateObj);

    if (!info.inst || info.status === 'Finalizado' || info.status === 'Agendado') return null;

    const events = [];

    if (row.instrutor1) {
        events.push({
            role: 'instrutor1',
            inst: row.instrutor1,
            d: row.inicio && row.inicio.length === 10 ? new Date(row.inicio + 'T00:00:00') : new Date('1970-01-01T00:00:00')
        });
    }

    if (row.instrutor2 && safeString(row.dataTransferencia).length === 10) {
        events.push({
            role: 'instrutor2',
            inst: row.instrutor2,
            d: new Date(row.dataTransferencia + 'T00:00:00')
        });
    }

    if (getSafeModalidade(row) === 'Técnica' && row.instrutor3 && safeString(row.dataTransferencia2).length === 10) {
        events.push({
            role: 'instrutor3',
            inst: row.instrutor3,
            d: new Date(row.dataTransferencia2 + 'T00:00:00')
        });
    }

    events.sort((a, b) => a.d - b.d);

    let active = null;
    events.forEach(ev => {
        if (dateObj >= ev.d) active = ev;
    });

    if (!active) return null;

    return {
        role: active.role,
        inst: getCanonical(active.inst)
    };
};

const getFutureBalanceDates = (rows) => {
    const dates = new Set();
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let latestRelevantDate = new Date(today);

    dates.add(getBalanceDateStr(today));

    rows.forEach(row => {
        ['inicio', 'dataTransferencia', 'dataTransferencia2', 'termino'].forEach(field => {
            const value = safeString(row[field]);
            if (value.length === 10) {
                const dateValue = new Date(value + 'T00:00:00');
                if (dateValue > latestRelevantDate) latestRelevantDate = dateValue;
                if (dateValue >= today) {
                    dates.add(value);
                }
                if (field === 'termino') {
                    const afterEnd = new Date(dateValue);
                    afterEnd.setDate(afterEnd.getDate() + 1);
                    if (afterEnd >= today) dates.add(getBalanceDateStr(afterEnd));
                }
            }
        });
    });

    if (BALANCE_LIMITS.monthsAhead > 0) {
        const minimumHorizon = new Date(today.getFullYear(), today.getMonth() + BALANCE_LIMITS.monthsAhead, 1);
        if (minimumHorizon > latestRelevantDate) latestRelevantDate = minimumHorizon;
    }

    const safetyLimit = new Date(today.getFullYear() + 5, today.getMonth(), 1);
    if (latestRelevantDate > safetyLimit) latestRelevantDate = safetyLimit;

    const cursor = new Date(today.getFullYear(), today.getMonth(), 1);
    while (cursor <= latestRelevantDate) {
        dates.add(getBalanceDateStr(cursor));
        cursor.setMonth(cursor.getMonth() + 1);
    }

    rows.forEach(row => {
        ['inicio', 'dataTransferencia', 'dataTransferencia2', 'termino'].forEach(field => {
            const value = safeString(row[field]);
            if (value.length === 10 && new Date(value + 'T00:00:00') >= today && new Date(value + 'T00:00:00') <= latestRelevantDate) {
                dates.add(value);
            }
        });
    });

    return [...dates].sort();
};

const getBalanceSnapshot = (rows, dateStr, instructorPoolOverride = null) => {
    const map = {};

    const balanceNames = [
        ...uniqueInstrutores,
        ...extraInstructors,
        ...(instructorPoolOverride || []),
        ...rows.flatMap(row => getBalanceRolesForClass(row).map(role => row[role]))
    ];

    [...new Set(balanceNames.map(safeString).filter(Boolean).map(nome => getCanonical(nome)))]
        .filter(nome => !isBlockedInstructorName(nome))
        .forEach(nome => {
            map[normalizeText(nome)] = {
                nome,
                totalAlunos: 0,
                totalTurmas: 0,
                cursos: {}
            };
        });

    rows.forEach(row => {
        const active = getActiveRoleOnBalanceDate(row, dateStr);
        if (!active || isBlockedInstructorName(active.inst)) return;

        const key = normalizeText(active.inst);
        if (!map[key]) {
            map[key] = {
                nome: active.inst,
                totalAlunos: 0,
                totalTurmas: 0,
                cursos: {}
            };
        }

        const alunos = parseInt(row.alunos) || 0;
        const courseKey = `${getSafeModalidade(row)}|${safeString(row.curso)}`;

        map[key].totalAlunos += alunos;
        map[key].totalTurmas += 1;
        map[key].cursos[courseKey] = (map[key].cursos[courseKey] || 0) + 1;
    });

    return Object.values(map);
};

const getBalanceTargetsForSnapshot = (snapshot) => {
    const base = snapshot || [];
    const totalAlunos = base.reduce((acc, inst) => acc + inst.totalAlunos, 0);
    const avg = base.length > 0 ? Math.round(totalAlunos / base.length) : 0;
    const halfGap = Math.floor(BALANCE_LIMITS.maxGap / 2);
    const isMinPossible = base.length > 0 ? totalAlunos >= (BALANCE_LIMITS.min * base.length) : true;

    if (!isMinPossible) {
        const lowVolumeMin = Math.max(0, avg - halfGap);
        return {
            avg,
            effectiveMin: lowVolumeMin,
            effectiveIdeal: avg,
            effectiveMax: lowVolumeMin + BALANCE_LIMITS.maxGap,
            totalAlunos,
            isMinPossible
        };
    }

    let effectiveMin = Math.max(BALANCE_LIMITS.min, avg - halfGap);
    let effectiveMax = effectiveMin + BALANCE_LIMITS.maxGap;

    if (avg > effectiveMax) {
        effectiveMax = avg;
        effectiveMin = Math.max(avg - BALANCE_LIMITS.maxGap, BALANCE_LIMITS.min);
    }

    if (effectiveMax > BALANCE_LIMITS.max && avg <= BALANCE_LIMITS.max) {
        effectiveMax = BALANCE_LIMITS.max;
        effectiveMin = Math.max(avg - BALANCE_LIMITS.maxGap, Math.min(effectiveMin, effectiveMax));
    }

    if (avg > BALANCE_LIMITS.max) {
        effectiveMax = avg;
        effectiveMin = Math.max(avg - BALANCE_LIMITS.maxGap, BALANCE_LIMITS.min);
    }

    const effectiveIdeal = avg || BALANCE_LIMITS.ideal;

    return {
        avg,
        effectiveMin,
        effectiveIdeal,
        effectiveMax,
        totalAlunos,
        isMinPossible
    };
};

const getBalancePenaltyForSnapshot = (snapshot) => {
    if (!snapshot || snapshot.length < 2) {
        return { penalty: 0, max: null, min: null, gap: 0, ...getBalanceTargetsForSnapshot(snapshot || []) };
    }

    const sorted = [...snapshot].sort((a, b) => b.totalAlunos - a.totalAlunos);
    const max = sorted[0];
    const min = sorted[sorted.length - 1];
    const gap = max.totalAlunos - min.totalAlunos;
    const targets = getBalanceTargetsForSnapshot(snapshot);

    let penalty = 0;

    snapshot.forEach(inst => {
        const aboveMax = Math.max(0, inst.totalAlunos - targets.effectiveMax);
        const aboveHard = Math.max(0, inst.totalAlunos - BALANCE_LIMITS.hardMax);
        const belowMin = Math.max(0, targets.effectiveMin - inst.totalAlunos);

        penalty += aboveMax * aboveMax * 18;
        penalty += aboveHard * aboveHard * 60;
        penalty += belowMin * belowMin * 12;
        penalty += Math.abs(inst.totalAlunos - targets.effectiveIdeal) * 2;

        Object.values(inst.cursos || {}).forEach(qtd => {
            if (qtd > BALANCE_LIMITS.maxSameCourse) {
                penalty += (qtd - BALANCE_LIMITS.maxSameCourse) * 250;
            }
        });
    });

    if (gap > BALANCE_LIMITS.maxGap) {
        penalty += (gap - BALANCE_LIMITS.maxGap) * (gap - BALANCE_LIMITS.maxGap) * 35;
    }

    return { penalty, max, min, gap, ...targets };
};

const getHardBalanceScore = (snapshot, info = null) => {
    const balanceInfo = info || getBalancePenaltyForSnapshot(snapshot);
    const base = snapshot || [];
    const belowMin = base.reduce((acc, inst) => acc + Math.max(0, balanceInfo.effectiveMin - inst.totalAlunos), 0);
    const aboveMax = base.reduce((acc, inst) => acc + Math.max(0, inst.totalAlunos - balanceInfo.effectiveMax), 0);
    const gapOverflow = Math.max(0, (balanceInfo.gap || 0) - BALANCE_LIMITS.maxGap);

    return {
        hardScore: (belowMin * belowMin * 1200) + (gapOverflow * gapOverflow * 900) + (aboveMax * aboveMax * 250) + (balanceInfo.penalty || 0),
        belowMin,
        aboveMax,
        gapOverflow
    };
};

const getTotalBalancePenalty = (rows, datesOverride = null) => {
    const dates = datesOverride || getFutureBalanceDates(rows);
    return dates.reduce((acc, dateStr) => {
        return acc + getBalancePenaltyForSnapshot(getBalanceSnapshot(rows, dateStr)).penalty;
    }, 0);
};

const getBalanceImpactDatesForMove = (row, role, allDates, fallbackDateStr) => {
    const dates = allDates.filter(dateStr => {
        const active = getActiveRoleOnBalanceDate(row, dateStr);
        return active && active.role === role;
    });

    if (!dates.includes(fallbackDateStr)) dates.push(fallbackDateStr);
    return [...new Set(dates)].sort();
};

const getBalanceIssues = (rows, datesOverride = null) => {
    const issues = [];

    const dates = datesOverride || getFutureBalanceDates(rows);
    dates.forEach(dateStr => {
        const snapshot = getBalanceSnapshot(rows, dateStr);
        if (snapshot.length < 2) return;

        const info = getBalancePenaltyForSnapshot(snapshot);
        if (info.totalAlunos <= 0) return;
        const hardInfo = getHardBalanceScore(snapshot, info);

        const belowTarget = info.min.totalAlunos < info.effectiveMin;
        const belowMinimum = info.isMinPossible && info.min.totalAlunos < BALANCE_LIMITS.min;

        if (
            info.max.totalAlunos > info.effectiveMax ||
            belowMinimum ||
            belowTarget ||
            info.gap > BALANCE_LIMITS.maxGap
        ) {
            issues.push({ dateStr, snapshot, ...info, ...hardInfo });
        }
    });

    return issues.sort((a, b) => {
        if (b.hardScore !== a.hardScore) return b.hardScore - a.hardScore;
        if (b.belowMin !== a.belowMin) return b.belowMin - a.belowMin;
        if (b.gapOverflow !== a.gapOverflow) return b.gapOverflow - a.gapOverflow;
        if (b.penalty !== a.penalty) return b.penalty - a.penalty;
        if (b.max.totalAlunos !== a.max.totalAlunos) return b.max.totalAlunos - a.max.totalAlunos;
        return b.gap - a.gap;
    });
};

const canInstructorReceiveBalanceClass = (row, role, targetName) => {
    const targetNorm = normalizeText(targetName);
    if (!targetNorm || isBlockedInstructorName(targetName)) return false;

    const modalidade = getSafeModalidade(row);
    const isTecnicaRole = modalidade === 'Técnica' || role === 'instrutor3';
    if (isTecnicaRole && !isTecnicaInstructor(targetName)) return false;
    if (role === 'instrutor3' && !isTecnicaRole) return false;

    const alreadyInClass = getBalanceRolesForClass(row)
        .filter(r => r !== role)
        .map(r => normalizeText(row[r]))
        .filter(Boolean);

    return !alreadyInClass.includes(targetNorm);
};

const findBestBalanceMove = (rows, issue, moveHistory, lockedMoveKeys = new Set(), futureDatesOverride = null) => {
    const overNorm = normalizeText(issue.max.nome);
    const beforePenalty = issue.penalty || getBalancePenaltyForSnapshot(issue.snapshot).penalty;
    const beforeHard = getHardBalanceScore(issue.snapshot, issue);
    const futureDates = futureDatesOverride || getFutureBalanceDates(rows);
    const beforeGlobalPenalty = getTotalBalancePenalty(rows, futureDates);
    let bestMove = null;

    const candidates = rows
        .map((row, index) => {
            const active = getActiveRoleOnBalanceDate(row, issue.dateStr);
            if (!active || normalizeText(active.inst) !== overNorm) return null;

            return {
                row,
                index,
                role: active.role,
                alunos: parseInt(row.alunos) || 0,
                key: `${safeString(row.id) || index}|${active.role}`
            };
        })
        .filter(Boolean)
        .filter(item => !lockedMoveKeys.has(item.key))
        .sort((a, b) => {
            const idealSize = Math.max(20, Math.round((issue.max.totalAlunos - issue.min.totalAlunos) / 2));
            return Math.abs(a.alunos - idealSize) - Math.abs(b.alunos - idealSize);
        })
        .slice(0, 16);

    candidates.forEach(item => {
        issue.snapshot
            .filter(inst => normalizeText(inst.nome) !== overNorm && inst.totalAlunos < issue.max.totalAlunos)
            .sort((a, b) => a.totalAlunos - b.totalAlunos)
            .forEach(target => {
                if (!canInstructorReceiveBalanceClass(item.row, item.role, target.nome)) return;

                const courseKey = `${getSafeModalidade(item.row)}|${safeString(item.row.curso)}`;
                const sameCourseCount = target.cursos[courseKey] || 0;
                const afterOver = issue.max.totalAlunos - item.alunos;
                const afterTarget = target.totalAlunos + item.alunos;
                const assignmentKey = `${item.key}->${normalizeText(target.nome)}`;

                if (moveHistory.has(assignmentKey)) return;

                if (afterTarget > BALANCE_LIMITS.hardMax) return;

                const simulatedRows = rows.map((row, idx) => {
                    if (idx !== item.index) return row;
                    return { ...row, [item.role]: target.nome };
                });
                if (getDuplicateInstructorInClass(simulatedRows[item.index])) return;
                const afterSnapshot = getBalanceSnapshot(simulatedRows, issue.dateStr);
                const afterInfo = getBalancePenaltyForSnapshot(afterSnapshot);
                const afterHard = getHardBalanceScore(afterSnapshot, afterInfo);
                const improvement = beforePenalty - afterInfo.penalty;
                const hardImprovement = beforeHard.hardScore - afterHard.hardScore;
                const afterGlobalPenalty = getTotalBalancePenalty(simulatedRows, futureDates);
                const globalImprovement = beforeGlobalPenalty - afterGlobalPenalty;

                if (globalImprovement <= 0) return;

                const afterTargetInfo = afterSnapshot.find(inst => normalizeText(inst.nome) === normalizeText(target.nome));
                const afterOverInfo = afterSnapshot.find(inst => normalizeText(inst.nome) === overNorm);
                const targetFinal = afterTargetInfo ? afterTargetInfo.totalAlunos : afterTarget;
                const overFinal = afterOverInfo ? afterOverInfo.totalAlunos : afterOver;
                const sameCourseAfter = sameCourseCount + 1;

                let score = 0;
                score -= hardImprovement * 1000;
                score -= improvement * 100;
                score -= globalImprovement * 50;
                score += Math.abs(targetFinal - issue.effectiveIdeal) * 8;
                score += Math.abs(overFinal - issue.effectiveIdeal) * 4;
                score += Math.max(0, targetFinal - issue.effectiveMax) * 1200;
                score += Math.max(0, issue.effectiveMin - targetFinal) * 700;
                score += Math.max(0, afterInfo.gap - BALANCE_LIMITS.maxGap) * Math.max(0, afterInfo.gap - BALANCE_LIMITS.maxGap) * 60;
                score += afterInfo.gap * 40;
                score += sameCourseAfter * 120;

                if (sameCourseAfter > BALANCE_LIMITS.maxSameCourse) score += (sameCourseAfter - BALANCE_LIMITS.maxSameCourse) * 3000;
                if (targetFinal >= issue.effectiveMin && targetFinal <= issue.effectiveMax) score -= 1000;
                if (overFinal <= issue.effectiveMax) score -= 600;

                const move = {
                    ...item,
                    from: issue.max.nome,
                    to: target.nome,
                    dateStr: issue.dateStr,
                    afterOver: overFinal,
                    afterTarget: targetFinal,
                    improvement,
                    hardImprovement,
                    globalImprovement,
                    assignmentKey,
                    score
                };

                if (!bestMove || move.score < bestMove.score) {
                    bestMove = move;
                }
            });
    });

    return bestMove;
};

const findDirectBalanceRepairMove = (rows, issue, moveHistory, lockedMoveKeys = new Set(), futureDatesOverride = null) => {
    const overNorm = normalizeText(issue.max.nome);
    const beforeHard = getHardBalanceScore(issue.snapshot, issue);
    const futureDates = futureDatesOverride || getFutureBalanceDates(rows);
    const beforeGlobalPenalty = getTotalBalancePenalty(rows, futureDates);
    let bestMove = null;

    const candidates = rows
        .map((row, index) => {
            const active = getActiveRoleOnBalanceDate(row, issue.dateStr);
            if (!active || normalizeText(active.inst) !== overNorm) return null;

            const key = `${safeString(row.id) || index}|${active.role}`;
            if (lockedMoveKeys.has(key)) return null;

            return {
                row,
                index,
                role: active.role,
                alunos: parseInt(row.alunos) || 0,
                key
            };
        })
        .filter(Boolean)
        .sort((a, b) => b.alunos - a.alunos);

    const targets = issue.snapshot
        .filter(inst => normalizeText(inst.nome) !== overNorm)
        .sort((a, b) => a.totalAlunos - b.totalAlunos);

    candidates.forEach(item => {
        targets.forEach(target => {
            if (!canInstructorReceiveBalanceClass(item.row, item.role, target.nome)) return;

            const assignmentKey = `${item.key}->${normalizeText(target.nome)}`;
            if (moveHistory.has(assignmentKey)) return;

            const simulatedRows = rows.map((row, idx) => {
                if (idx !== item.index) return row;
                return { ...row, [item.role]: target.nome };
            });

            if (getDuplicateInstructorInClass(simulatedRows[item.index])) return;

            const afterSnapshot = getBalanceSnapshot(simulatedRows, issue.dateStr);
            const afterInfo = getBalancePenaltyForSnapshot(afterSnapshot);
            const afterHard = getHardBalanceScore(afterSnapshot, afterInfo);
            const hardImprovement = beforeHard.hardScore - afterHard.hardScore;
            const afterGlobalPenalty = getTotalBalancePenalty(simulatedRows, futureDates);
            const globalImprovement = beforeGlobalPenalty - afterGlobalPenalty;

            if (globalImprovement <= 0) return;

            const afterTargetInfo = afterSnapshot.find(inst => normalizeText(inst.nome) === normalizeText(target.nome));
            const afterOverInfo = afterSnapshot.find(inst => normalizeText(inst.nome) === overNorm);
            const targetFinal = afterTargetInfo ? afterTargetInfo.totalAlunos : target.totalAlunos + item.alunos;
            const overFinal = afterOverInfo ? afterOverInfo.totalAlunos : issue.max.totalAlunos - item.alunos;
            const courseKey = `${getSafeModalidade(item.row)}|${safeString(item.row.curso)}`;
            const sameCourseAfter = (target.cursos[courseKey] || 0) + 1;

            let score = 0;
            score += afterInfo.gap * 10000;
            score += Math.max(0, issue.effectiveMin - targetFinal) * 3000;
            score += Math.max(0, issue.effectiveMin - overFinal) * 2000;
            score += Math.max(0, targetFinal - issue.effectiveMax) * 5000;
            score += Math.max(0, overFinal - issue.effectiveMax) * 1000;
            score -= hardImprovement;
            score -= globalImprovement * 50;
            score += sameCourseAfter * 150;

            if (sameCourseAfter > BALANCE_LIMITS.maxSameCourse) {
                score += (sameCourseAfter - BALANCE_LIMITS.maxSameCourse) * 3000;
            }

            const move = {
                ...item,
                from: issue.max.nome,
                to: target.nome,
                dateStr: issue.dateStr,
                afterOver: overFinal,
                afterTarget: targetFinal,
                improvement: issue.penalty - afterInfo.penalty,
                hardImprovement,
                globalImprovement,
                assignmentKey,
                score
            };

            if (!bestMove || move.score < bestMove.score) {
                bestMove = move;
            }
        });
    });

    return bestMove;
};

const findBestSystemBalanceMove = (rows, issues, moveHistory, lockedMoveKeys = new Set(), futureDatesOverride = null) => {
    const batchSize = 12;

    for (let start = 0; start < issues.length; start += batchSize) {
        let bestMove = null;
        const batch = issues.slice(start, start + batchSize);

        batch.forEach(issue => {
            const move = findDirectBalanceRepairMove(rows, issue, moveHistory, lockedMoveKeys, futureDatesOverride)
                || findBestBalanceMove(rows, issue, moveHistory, lockedMoveKeys, futureDatesOverride);
            if (!move) return;

            if (
                !bestMove ||
                move.hardImprovement > bestMove.hardImprovement ||
                (move.hardImprovement === bestMove.hardImprovement && move.globalImprovement > bestMove.globalImprovement) ||
                (move.hardImprovement === bestMove.hardImprovement && move.globalImprovement === bestMove.globalImprovement && move.score < bestMove.score)
            ) {
                bestMove = move;
            }
        });

        if (bestMove) {
            return bestMove;
        }
    }

    return null;
};

const executeBalanceOnRows = (sourceRows, lockedMoveKeys = new Set()) => {
    let newRows = (sourceRows || []).map(row => ({ ...row }));
    const futureDates = getFutureBalanceDates(newRows);
    const initialIssues = getBalanceIssues(newRows, futureDates);
    const moveHistory = new Set();
    const moves = [];

    newRows.forEach((row, index) => {
        getBalanceRolesForClass(row).forEach(role => {
            const currentName = normalizeText(row[role]);
            if (currentName) {
                moveHistory.add(`${safeString(row.id) || index}|${role}->${currentName}`);
            }
        });
    });

    for (let i = 0; i < BALANCE_LIMITS.maxMoves; i++) {
        const issues = getBalanceIssues(newRows, futureDates);
        if (issues.length === 0) break;

        const move = findBestSystemBalanceMove(newRows, issues, moveHistory, lockedMoveKeys, futureDates);
        if (!move) break;

        const current = newRows[move.index];

        newRows[move.index] = {
            ...current,
            [move.role]: move.to,
            autoAssignedLogs: {
                ...(current.autoAssignedLogs || {}),
                [move.role]: {
                    nome: move.to,
                    type: 'rebalance-future',
                    reason: `Rebalanceamento futuro em ${formatDatePTBR(move.dateStr)}: saiu de ${move.from} para reduzir sobrecarga.`
                }
            }
        };

        moveHistory.add(move.assignmentKey);
        moves.push(move);
    }

    return {
        rows: newRows,
        moves,
        initialIssues,
        remainingIssues: getBalanceIssues(newRows, futureDates)
    };
};

const getChronologicalBalanceDates = (rows) => {
    const dates = new Set();
    const start = new Date((viewDate || new Date().toISOString().split('T')[0]) + 'T00:00:00');
    const cursor = new Date(start.getFullYear(), start.getMonth(), 1);
    let latest = new Date(cursor);
    dates.add(getBalanceDateStr(start));

    rows.forEach(row => {
        ['inicio', 'dataTransferencia', 'dataTransferencia2', 'termino'].forEach(field => {
            const value = safeString(row[field]);
            if (value.length !== 10) return;
            const dateValue = new Date(value + 'T00:00:00');
            if (dateValue > latest) latest = dateValue;
        });
    });

    const maxLatest = new Date(cursor.getFullYear(), cursor.getMonth() + 18, 1);
    if (latest > maxLatest) latest = maxLatest;

    while (cursor <= latest) {
        // Checkpoints semanais evitam que o sistema fique equilibrado no dia 01,
        // mas desbalanceado depois de entradas/passagens no meio do mês.
        [1, 8, 9, 15, 22].forEach(day => {
            const checkpoint = new Date(cursor.getFullYear(), cursor.getMonth(), day);
            if (checkpoint >= start && checkpoint <= latest) dates.add(getBalanceDateStr(checkpoint));
        });
        cursor.setMonth(cursor.getMonth() + 1);
    }

    rows.forEach(row => {
        ['inicio', 'dataTransferencia', 'dataTransferencia2', 'termino'].forEach(field => {
            const value = safeString(row[field]);
            if (value.length !== 10) return;

            const dateValue = new Date(value + 'T00:00:00');
            if (dateValue < start || dateValue > latest) return;

            dates.add(getBalanceDateStr(dateValue));

            if (field === 'termino') {
                const afterEnd = new Date(dateValue);
                afterEnd.setDate(afterEnd.getDate() + 1);
                if (afterEnd >= start && afterEnd <= latest) dates.add(getBalanceDateStr(afterEnd));
            }
        });
    });

    return [...dates].sort();
};

const getChronologicalSnapshot = (rows, dateStr, instructorPoolOverride = null) => {
    return getBalanceSnapshot(rows, dateStr, instructorPoolOverride)
        .sort((a, b) => b.totalAlunos - a.totalAlunos);
};

const getChronologicalDateScore = (rows, dateStr, instructorPoolOverride = null) => {
    const snapshot = getChronologicalSnapshot(rows, dateStr, instructorPoolOverride);

    if (snapshot.length < 2) {
        return { score: 0, gap: 0, top: null, bottom: null, snapshot };
    }

    const top = snapshot[0];
    const bottom = snapshot[snapshot.length - 1];
    const gap = top.totalAlunos - bottom.totalAlunos;
    const totalAlunos = snapshot.reduce((acc, inst) => acc + inst.totalAlunos, 0);
    const avg = totalAlunos / snapshot.length;
    const minPossible = totalAlunos >= (BALANCE_LIMITS.min * snapshot.length);

    let score = 0;
    score += Math.max(0, gap - BALANCE_LIMITS.maxGap) * Math.max(0, gap - BALANCE_LIMITS.maxGap) * 10000;
    score += Math.max(0, top.totalAlunos - BALANCE_LIMITS.max) * Math.max(0, top.totalAlunos - BALANCE_LIMITS.max) * 3000;
    score += snapshot.reduce((acc, inst) => acc + (Math.abs(inst.totalAlunos - avg) * 12), 0);

    if (minPossible) {
        score += snapshot.reduce((acc, inst) => {
            const below = Math.max(0, BALANCE_LIMITS.min - inst.totalAlunos);
            return acc + (below * below * 1000);
        }, 0);
    }

    return { score, gap, top, bottom, snapshot, avg, minPossible };
};

const getOperationalBalanceDateStr = () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return getBalanceDateStr(today);
};

const isRoleProtectedByCurrentInstructor = (row, role) => {
    const active = getActiveRoleOnBalanceDate(row, getOperationalBalanceDateStr());
    return active && active.role === role && safeString(row[role]);
};

const canMoveRoleForBalance = (row, role, key, lockedMoveKeys = new Set()) => {
    if (!safeString(row[role])) return false;
    if (lockedMoveKeys.has(key)) return false;

    const log = row.autoAssignedLogs && typeof row.autoAssignedLogs === 'object'
        ? row.autoAssignedLogs[role]
        : null;

    if (log && typeof log === 'object' && log.type === 'preserved-current') return false;

    // Mantém o instrutor que está ativo hoje. O equilíbrio pode mexer nas
    // passagens futuras e nas turmas agendadas, inclusive se vieram manuais.
    return !isRoleProtectedByCurrentInstructor(row, role);
};

const getGlobalChronologicalBalanceScore = (rows, balanceDates, pool) => {
    const dateInfos = balanceDates.map(dateStr => ({
        dateStr,
        ...getChronologicalDateScore(rows, dateStr, pool)
    }));

    const issues = dateInfos
        .filter(info => info.top && info.gap > BALANCE_LIMITS.maxGap)
        .sort((a, b) => {
            if (b.gap !== a.gap) return b.gap - a.gap;
            return b.score - a.score;
        });

    const worstGap = issues.length > 0 ? issues[0].gap : 0;
    const score = dateInfos.reduce((acc, info) => {
        if (!info.top) return acc;
        const gapOverflow = Math.max(0, info.gap - BALANCE_LIMITS.maxGap);
        const topOverflow = Math.max(0, info.top.totalAlunos - BALANCE_LIMITS.max);
        const lowPenalty = info.minPossible
            ? info.snapshot.reduce((sum, inst) => {
                const below = Math.max(0, BALANCE_LIMITS.min - inst.totalAlunos);
                return sum + (below * below * 500);
            }, 0)
            : 0;

        return acc
            + info.score
            + (gapOverflow * gapOverflow * 25000)
            + (topOverflow * topOverflow * 5000)
            + lowPenalty;
    }, 0);

    return { score, issues, worstGap, dateInfos };
};

const getFocusedMoveDates = (row, role, allDates, dateStr, priorityDateStr = '') => {
    const dates = getBalanceImpactDatesForMove(row, role, allDates, dateStr);
    if (priorityDateStr && !dates.includes(priorityDateStr)) dates.push(priorityDateStr);
    return [...new Set(dates)].sort();
};

const getFocusedChronologicalScore = (rows, dates, pool) => {
    return dates.reduce((acc, dateStr) => {
        const info = getChronologicalDateScore(rows, dateStr, pool);
        const gapOverflow = Math.max(0, info.gap - BALANCE_LIMITS.maxGap);
        const topOverflow = info.top ? Math.max(0, info.top.totalAlunos - BALANCE_LIMITS.max) : 0;
        const lowPenalty = info.minPossible
            ? info.snapshot.reduce((sum, inst) => sum + Math.max(0, BALANCE_LIMITS.min - inst.totalAlunos), 0)
            : 0;

        return acc + info.score + (gapOverflow * gapOverflow * 8000) + (topOverflow * topOverflow * 1200) + (lowPenalty * lowPenalty * 400);
    }, 0);
};

const findFocusedChronologicalRepairMove = (rows, issues, balanceDates, pool, lockedMoveKeys, moveHistory, priorityDateStr = '', maxIssues = 24, protectPriorityDate = true, maxDonors = 4, protectedDateList = [], allowTemporaryImpact = false) => {
    let bestMove = null;

    issues.slice(0, maxIssues).forEach(issue => {
        if (!issue.top || issue.gap <= BALANCE_LIMITS.maxGap) return;

        const bottomLoad = issue.bottom ? issue.bottom.totalAlunos : issue.snapshot[issue.snapshot.length - 1].totalAlunos;
        const donors = [...issue.snapshot]
            .filter(inst => inst.totalAlunos > bottomLoad + 5)
            .sort((a, b) => b.totalAlunos - a.totalAlunos)
            .slice(0, maxDonors);

        donors.forEach(donor => {
            const donorNorm = normalizeText(donor.nome);
            const lowTargets = [...issue.snapshot]
                .filter(inst => normalizeText(inst.nome) !== donorNorm && inst.totalAlunos < donor.totalAlunos)
                .sort((a, b) => a.totalAlunos - b.totalAlunos)
                .slice(0, 8);

            const candidates = rows
                .map((row, index) => {
                    const active = getActiveRoleOnBalanceDate(row, issue.dateStr);
                    if (!active || normalizeText(active.inst) !== donorNorm) return null;

                    const key = `${safeString(row.id) || index}|${active.role}`;
                    if (!canMoveRoleForBalance(row, active.role, key, lockedMoveKeys)) return null;

                    return {
                        row,
                        index,
                        role: active.role,
                        alunos: parseInt(row.alunos) || 0,
                        key
                    };
                })
                .filter(Boolean)
                .sort((a, b) => {
                    const idealMove = Math.max(18, issue.gap / 2);
                    return Math.abs(a.alunos - idealMove) - Math.abs(b.alunos - idealMove);
                })
                .slice(0, 12);

            candidates.forEach(item => {
                lowTargets.forEach(target => {
                    if (!canInstructorReceiveBalanceClass(item.row, item.role, target.nome)) return;

                    const historyKey = `${item.key}->${normalizeText(target.nome)}@${issue.dateStr}`;
                    if (moveHistory.has(historyKey)) return;

                    const simulatedRows = rows.map((row, idx) => {
                        if (idx !== item.index) return row;
                        return {
                            ...row,
                            [item.role]: target.nome,
                            autoAssignedLogs: {
                                ...(row.autoAssignedLogs || {}),
                                [item.role]: {
                                    nome: target.nome,
                                    type: 'rebalance-future',
                                    reason: `Reparo de equilíbrio em ${formatDatePTBR(issue.dateStr)}: saiu de ${donor.nome} para manter a diferença máxima de ${BALANCE_LIMITS.maxGap} alunos.`
                                }
                            }
                        };
                    });

                    if (getDuplicateInstructorInClass(simulatedRows[item.index])) return;

                    const afterIssue = getChronologicalDateScore(simulatedRows, issue.dateStr, pool);
                    if (!afterIssue.top) return;
                    if (afterIssue.gap >= issue.gap && afterIssue.score >= issue.score) return;

                    const affectedDates = getFocusedMoveDates(simulatedRows[item.index], item.role, balanceDates, issue.dateStr, priorityDateStr);
                    const unsafeImpact = affectedDates.some(dateStr => {
                        const before = getChronologicalDateScore(rows, dateStr, pool);
                        const after = getChronologicalDateScore(simulatedRows, dateStr, pool);
                        const allowedGap = Math.max(BALANCE_LIMITS.maxGap + 35, before.gap + 12);
                        const topTooHigh = after.top && after.top.totalAlunos > BALANCE_LIMITS.hardMax + 20;
                        return after.gap > allowedGap || topTooHigh;
                    });

                    if (unsafeImpact && !allowTemporaryImpact) return;

                    if (priorityDateStr && protectPriorityDate) {
                        const priorityBefore = getChronologicalDateScore(rows, priorityDateStr, pool);
                        const priorityAfter = getChronologicalDateScore(simulatedRows, priorityDateStr, pool);
                        if (priorityAfter.gap > priorityBefore.gap) return;
                        if (priorityBefore.gap <= BALANCE_LIMITS.maxGap && priorityAfter.gap > BALANCE_LIMITS.maxGap) return;
                    }

                    const protectedImpactBad = (protectedDateList || [])
                        .filter(protectedDate => protectedDate !== issue.dateStr && affectedDates.includes(protectedDate))
                        .some(protectedDate => {
                            const beforeProtected = getChronologicalDateScore(rows, protectedDate, pool);
                            if (!beforeProtected.top || beforeProtected.gap > BALANCE_LIMITS.maxGap) return false;
                            const afterProtected = getChronologicalDateScore(simulatedRows, protectedDate, pool);
                            return afterProtected.gap > beforeProtected.gap || afterProtected.gap > BALANCE_LIMITS.maxGap;
                        });

                    if (protectedImpactBad) return;

                    const beforeFocused = getFocusedChronologicalScore(rows, affectedDates, pool);
                    const afterFocused = getFocusedChronologicalScore(simulatedRows, affectedDates, pool);
                    const courseKey = `${getSafeModalidade(item.row)}|${safeString(item.row.curso)}`;
                    const targetAfter = afterIssue.snapshot.find(inst => normalizeText(inst.nome) === normalizeText(target.nome));
                    const sameCourseAfter = targetAfter && targetAfter.cursos ? (targetAfter.cursos[courseKey] || 0) : 0;
                    const priorityBonus = priorityDateStr && issue.dateStr === priorityDateStr ? 900000 : 0;

                    let score = 0;
                    score += afterIssue.gap * 120000;
                    score += Math.max(0, afterIssue.gap - BALANCE_LIMITS.maxGap) * Math.max(0, afterIssue.gap - BALANCE_LIMITS.maxGap) * 8000;
                    score += afterFocused - beforeFocused;
                    score += sameCourseAfter * 800;
                    if (sameCourseAfter > BALANCE_LIMITS.maxSameCourse) score += (sameCourseAfter - BALANCE_LIMITS.maxSameCourse) * 9000;
                    score -= priorityBonus;

                    const move = {
                        ...item,
                        from: donor.nome,
                        to: target.nome,
                        dateStr: issue.dateStr,
                        afterGap: afterIssue.gap,
                        historyKey,
                        score
                    };

                    if (
                        !bestMove ||
                        move.score < bestMove.score ||
                        (move.score === bestMove.score && move.afterGap < bestMove.afterGap)
                    ) {
                        bestMove = move;
                    }
                });
            });
        });
    });

    return bestMove;
};

const getCriticalChronologicalPriorityDates = (rows, pool, maxDates = 8) => {
    const dates = getChronologicalBalanceDates(rows);
    const issueInfos = dates
        .map(dateStr => ({ dateStr, ...getChronologicalDateScore(rows, dateStr, pool) }))
        .filter(info => info.top && info.gap > BALANCE_LIMITS.maxGap);

    const dayNinePriorities = issueInfos
        .filter(info => info.dateStr.endsWith('-09'))
        .sort((a, b) => a.dateStr.localeCompare(b.dateStr))
        .slice(0, Math.max(4, Math.floor(maxDates / 2)))
        .map(info => info.dateStr);

    const bestByMonth = {};
    issueInfos.forEach(info => {
        const monthKey = info.dateStr.slice(0, 7);
        if (
            !bestByMonth[monthKey] ||
            info.gap > bestByMonth[monthKey].gap ||
            (info.gap === bestByMonth[monthKey].gap && info.score > bestByMonth[monthKey].score)
        ) {
            bestByMonth[monthKey] = info;
        }
    });

    const monthPriorities = Object.values(bestByMonth)
        .sort((a, b) => {
            // Meses próximos entram primeiro; dentro do mês, pega o pior dia.
            if (a.dateStr.slice(0, 7) !== b.dateStr.slice(0, 7)) {
                return a.dateStr.localeCompare(b.dateStr);
            }
            if (b.gap !== a.gap) return b.gap - a.gap;
            return b.score - a.score;
        })
        .map(info => info.dateStr);

    return [...new Set([...dayNinePriorities, ...monthPriorities])].slice(0, maxDates);
};

const getMonthlyBalanceSweepPlan = (rows, pool, monthsAhead = 5) => {
    const allDates = getChronologicalBalanceDates(rows);
    const start = new Date((viewDate || new Date().toISOString().split('T')[0]) + 'T00:00:00');
    const firstMonth = new Date(start.getFullYear(), start.getMonth() + 1, 1);
    const horizon = new Date(start.getFullYear(), start.getMonth() + monthsAhead, 31);
    const byMonth = {};

    allDates.forEach(dateStr => {
        const dateObj = new Date(dateStr + 'T00:00:00');
        if (dateObj < firstMonth || dateObj > horizon) return;

        const info = getChronologicalDateScore(rows, dateStr, pool);
        if (!info.top || info.snapshot.length < 2) return;

        const monthKey = dateStr.slice(0, 7);
        if (!byMonth[monthKey]) byMonth[monthKey] = [];
        byMonth[monthKey].push({ dateStr, ...info });
    });

    const priorityDates = [];
    const impossibleMonths = [];

    Object.keys(byMonth).sort().forEach(monthKey => {
        const monthInfos = byMonth[monthKey].sort((a, b) => {
            if (b.gap !== a.gap) return b.gap - a.gap;
            return b.score - a.score;
        });

        const worst = monthInfos[0];
        if (!worst) return;

        if (!worst.minPossible) {
            impossibleMonths.push({
                monthKey,
                avg: Math.round(worst.avg || 0),
                total: worst.snapshot.reduce((acc, inst) => acc + inst.totalAlunos, 0),
                instructors: worst.snapshot.length,
                gap: worst.gap,
                top: worst.top,
                bottom: worst.bottom
            });
            return;
        }

        if (worst.gap <= BALANCE_LIMITS.maxGap) return;

        const dayNine = monthInfos.find(info => info.dateStr.endsWith('-09') && info.gap > BALANCE_LIMITS.maxGap);
        [dayNine, worst].filter(Boolean).forEach(info => {
            if (!priorityDates.includes(info.dateStr)) priorityDates.push(info.dateStr);
        });
    });

    return {
        priorityDates: priorityDates.slice(0, 10),
        impossibleMonths
    };
};

const executeChronologicalAutoBalance = (sourceRows, lockedMoveKeys = new Set(), instructorPoolOverride = null, options = {}) => {
    let newRows = (sourceRows || []).map(row => ({
        ...row,
        autoAssignedLogs: normalizeAutoAssignedLogs(row.autoAssignedLogs)
    }));
    const balanceDates = getChronologicalBalanceDates(newRows);
    const pool = instructorPoolOverride || uniqueInstrutores;
    const priorityDateStr = (options.priorityDateStr && options.priorityDateStr.length === 10)
        ? options.priorityDateStr
        : '';
    const priorityDateList = [
        ...(priorityDateStr ? [priorityDateStr] : []),
        ...(Array.isArray(options.priorityDateList) ? options.priorityDateList : [])
    ]
        .filter(dateStr => safeString(dateStr).length === 10)
        .filter((dateStr, idx, arr) => arr.indexOf(dateStr) === idx)
        .slice(0, options.maxPriorityDates || 8);
    const lockedPreviousGaps = {};
    const moves = [];

    const chronologicalIterations = options.skipChronologicalPass ? 0 : (options.maxChronologicalIterations || 40);

    balanceDates.forEach((dateStr, dateIndex) => {
        for (let iter = 0; iter < chronologicalIterations; iter++) {
            const current = getChronologicalDateScore(newRows, dateStr, pool);
            if (!current.top || current.gap <= BALANCE_LIMITS.maxGap) break;

            const lowTargets = [...current.snapshot]
                .sort((a, b) => a.totalAlunos - b.totalAlunos)
                .slice(0, 6);

            const candidates = newRows
                .map((row, index) => {
                    const active = getActiveRoleOnBalanceDate(row, dateStr);
                    if (!active || normalizeText(active.inst) !== normalizeText(current.top.nome)) return null;

                    const key = `${safeString(row.id) || index}|${active.role}`;
                    if (!canMoveRoleForBalance(row, active.role, key, lockedMoveKeys)) return null;

                    return {
                        row,
                        index,
                        role: active.role,
                        alunos: parseInt(row.alunos) || 0,
                        key
                    };
                })
                .filter(Boolean)
                .sort((a, b) => {
                    const idealMove = Math.max(15, current.gap / 2);
                    return Math.abs(a.alunos - idealMove) - Math.abs(b.alunos - idealMove);
                })
                .slice(0, 20);

            let bestMove = null;

            candidates.forEach(item => {
                lowTargets.forEach(target => {
                    if (normalizeText(target.nome) === normalizeText(current.top.nome)) return;
                    if (!canInstructorReceiveBalanceClass(item.row, item.role, target.nome)) return;

                    const simulatedRows = newRows.map((row, idx) => {
                        if (idx !== item.index) return row;
                        return {
                            ...row,
                            [item.role]: target.nome,
                            autoAssignedLogs: {
                                ...(row.autoAssignedLogs || {}),
                                [item.role]: {
                                    nome: target.nome,
                                    type: 'rebalance-future',
                                    reason: `Ajuste cronológico em ${formatDatePTBR(dateStr)}: saiu de ${current.top.nome} para reduzir a diferença mensal.`
                                }
                            }
                        };
                    });

                    if (getDuplicateInstructorInClass(simulatedRows[item.index])) return;

                    const after = getChronologicalDateScore(simulatedRows, dateStr, pool);
                    if (after.score >= current.score && after.gap >= current.gap) return;

                    const previousDatesOk = balanceDates.slice(0, dateIndex).every(previousDate => {
                        if (lockedPreviousGaps[previousDate] === undefined) return true;
                        const allowedPreviousGap = Math.max(BALANCE_LIMITS.maxGap, lockedPreviousGaps[previousDate] + 5);
                        return getChronologicalDateScore(simulatedRows, previousDate, pool).gap <= allowedPreviousGap;
                    });

                    if (!previousDatesOk) return;

                    const improvement = current.score - after.score;
                    const move = {
                        ...item,
                        from: current.top.nome,
                        to: target.nome,
                        dateStr,
                        afterGap: after.gap,
                        improvement
                    };

                    if (
                        !bestMove ||
                        move.afterGap < bestMove.afterGap ||
                        (move.afterGap === bestMove.afterGap && move.improvement > bestMove.improvement)
                    ) {
                        bestMove = move;
                    }
                });
            });

            if (!bestMove) break;

            const currentRow = newRows[bestMove.index];
            newRows[bestMove.index] = {
                ...currentRow,
                [bestMove.role]: bestMove.to,
                autoAssignedLogs: {
                    ...(currentRow.autoAssignedLogs || {}),
                    [bestMove.role]: {
                        nome: bestMove.to,
                        type: 'rebalance-future',
                        reason: `Ajuste cronológico em ${formatDatePTBR(bestMove.dateStr)}: saiu de ${bestMove.from} para reduzir a diferença mensal.`
                    }
                }
            };

            moves.push(bestMove);
        }

        lockedPreviousGaps[dateStr] = getChronologicalDateScore(newRows, dateStr, pool).gap;
    });

    const repairMoveHistory = new Set();
    const applyRepairMove = (bestMove) => {
        const currentRow = newRows[bestMove.index];
        newRows[bestMove.index] = {
            ...currentRow,
            [bestMove.role]: bestMove.to,
            autoAssignedLogs: {
                ...(currentRow.autoAssignedLogs || {}),
                [bestMove.role]: {
                    nome: bestMove.to,
                    type: 'rebalance-future',
                    reason: `Reparo de equilíbrio em ${formatDatePTBR(bestMove.dateStr)}: saiu de ${bestMove.from} para manter diferença máxima de ${BALANCE_LIMITS.maxGap} alunos.`
                }
            }
        };

        repairMoveHistory.add(bestMove.historyKey);
        moves.push(bestMove);
    };

    const repairPriorityDate = (dateStr) => {
        if (!dateStr) return;

        const priorityMoveHistory = new Set();

        for (let iter = 0; iter < (options.priorityRepairMoves || 28); iter++) {
            const priorityInfo = { dateStr, ...getChronologicalDateScore(newRows, dateStr, pool) };
            if (!priorityInfo.top || priorityInfo.gap <= BALANCE_LIMITS.maxGap) break;

            const priorityMove = findFocusedChronologicalRepairMove(
                newRows,
                [priorityInfo],
                balanceDates,
                pool,
                lockedMoveKeys,
                priorityMoveHistory,
                dateStr,
                1,
                true,
                options.priorityMaxDonors || 8,
                [],
                true
            );

            if (!priorityMove) break;
            priorityMoveHistory.add(priorityMove.historyKey);
            applyRepairMove(priorityMove);
        }
    };

    const repairPriorityDates = (cycles = 1) => {
        for (let cycle = 0; cycle < cycles; cycle++) {
            const beforeMoveCount = moves.length;
            const orderedPriorityDates = priorityDateList
                .map(dateStr => ({ dateStr, ...getChronologicalDateScore(newRows, dateStr, pool) }))
                .filter(info => info.top && info.gap > BALANCE_LIMITS.maxGap)
                .sort((a, b) => {
                    if (b.gap !== a.gap) return b.gap - a.gap;
                    return b.score - a.score;
                })
                .map(info => info.dateStr);

            orderedPriorityDates.forEach(repairPriorityDate);
            if (moves.length === beforeMoveCount) break;
        }
    };

    repairPriorityDates(1);

    for (let iter = 0; iter < (options.maxRepairMoves || 35); iter++) {
        const remaining = balanceDates
            .map(dateStr => ({ dateStr, ...getChronologicalDateScore(newRows, dateStr, pool) }))
            .filter(info => info.top && info.gap > BALANCE_LIMITS.maxGap)
            .sort((a, b) => {
                const aPriority = priorityDateList.includes(a.dateStr) ? 1 : 0;
                const bPriority = priorityDateList.includes(b.dateStr) ? 1 : 0;
                if (aPriority !== bPriority) return bPriority - aPriority;
                if (b.gap !== a.gap) return b.gap - a.gap;
                return b.score - a.score;
            });

        if (remaining.length === 0) break;

        const bestMove = findFocusedChronologicalRepairMove(
            newRows,
            remaining,
            balanceDates,
            pool,
            lockedMoveKeys,
            repairMoveHistory,
            priorityDateStr,
            options.maxRepairIssues || 8,
            options.protectPriorityDate !== false,
            options.maxDonors || 4,
            options.protectPriorityDate === false ? [] : priorityDateList
        );
        if (!bestMove) break;
        applyRepairMove(bestMove);
    }

    repairPriorityDates(options.priorityRepairCycles || 3);

    const remainingIssues = balanceDates
        .map(dateStr => ({ dateStr, ...getChronologicalDateScore(newRows, dateStr, pool) }))
        .filter(info => info.top && info.gap > BALANCE_LIMITS.maxGap);

    return { rows: newRows, moves, remainingIssues };
};

// === IA: SIMULADOR DE CENÁRIOS DE EQUILÍBRIO AVANÇADO (VISUAL COMPLETO) ===
            const openSimulator = (scopeToUse = 'all', isNewScenario = false) => {
                if (!data || data.length === 0) {
                    alert("Não há turmas na base de dados para simular.");
                    return;
                }

                let tempDb = JSON.parse(JSON.stringify(data)); // Cópia segura em standby
                let simulatedClasses = [];
                let totalAlocacoesModificadas = 0;
                
                const parseSecureDate = (str) => {
                    if (!str) return null;
                    const parts = String(str).split('/');
                    if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
                    return new Date(str + 'T00:00:00');
                };

                const dataAlvoOtimizacao = parseSecureDate(viewDate) || new Date();
                const mesAlvo = dataAlvoOtimizacao.getMonth();
                const anoAlvo = dataAlvoOtimizacao.getFullYear();

                // Coleta todos os instrutores ativos reais
                let listaReais = new Set();
                tempDb.forEach(d => {
                    if (d.instrutor1 && d.instrutor1.trim().length > 1) listaReais.add(d.instrutor1.trim());
                    if (d.instrutor2 && d.instrutor2.trim().length > 1) listaReais.add(d.instrutor2.trim());
                    if (d.instrutor3 && d.instrutor3.trim().length > 1) listaReais.add(d.instrutor3.trim());
                    if (d.instrutorAtual && d.instrutorAtual.trim().length > 1 && !d.instrutorAtual.toLowerCase().includes('nao atribuido')) {
                        listaReais.add(d.instrutorAtual.trim());
                    }
                });
                
                let arrayReais = Array.from(listaReais);

                // Se acionado "Gerar Novo Cenário", rotaciona levemente a fila de desempates
                if (isNewScenario) {
                    arrayReais.sort(() => Math.random() - 0.5);
                }

                // Processa a simulação linear de toda a base
                for (let i = 0; i < tempDb.length; i++) {
                    let row = tempDb[i];
                    
                    // Tratamento do filtro de escopo cronológico
                    const dInicio = parseSecureDate(row.inicio);
                    const pertenceAoMesFiltrado = dInicio && dInicio.getMonth() === mesAlvo && dInicio.getFullYear() === anoAlvo;
                    
                    if (scopeToUse === 'filtered' && !pertenceAoMesFiltrado) {
                        continue; // Pula turmas que não pertencem ao mês ativo
                    }

                    // Backup do estado vindo da planilha
                    const estadoAnterior = {
                        i1: row.instrutor1 || 'Não Atribuído',
                        i2: row.instrutor2 || 'Não Atribuído',
                        i3: row.instrutor3 || 'Não Atribuído',
                        atual: row.instrutorAtual || 'Não Atribuído'
                    };

                    let roles = ['instrutor1', 'instrutor2'];
                    if (row.modalidade === 'Técnica') roles = ['instrutor1', 'instrutor2', 'instrutor3'];

                    const dTrans1 = parseSecureDate(row.dataTransferencia);
                    const dTrans2 = parseSecureDate(row.dataTransferencia2);
                    let papelAtualDaLinhaDoTempo = 'instrutor1';

                    if (row.modalidade === 'Técnica') {
                        if (dTrans1 && dataAlvoOtimizacao >= dTrans1) papelAtualDaLinhaDoTempo = 'instrutor2';
                        if (dTrans2 && dataAlvoOtimizacao >= dTrans2) papelAtualDaLinhaDoTempo = 'instrutor3';
                    } else {
                        if (dTrans1 && dataAlvoOtimizacao >= dTrans1) papelAtualDaLinhaDoTempo = 'instrutor2';
                    }

                    const currentInstVal = String(row.instrutorAtual || '').trim();
                    const isAtualPreenchido = currentInstVal !== '' && !currentInstVal.toLowerCase().includes('nao atribuido') && currentInstVal !== 'undefined';

                    if (isAtualPreenchido) {
                        row[papelAtualDaLinhaDoTempo] = currentInstVal;
                    }

                    let rowChanged = false;

                    for (let role of roles) {
                        if (isAtualPreenchido && role === papelAtualDaLinhaDoTempo) continue;

                        const currentValue = String(row[role] || '').trim();
                        const alreadyInClass = roles.map(r => row[r]).filter(Boolean);
                        
                        const options = getBalancedInstructorOptions(row, role, alreadyInClass, [], arrayReais, null, tempDb);
                        
                        if (options && options.length > 0) {
                            const bestOption = options[0].nome;
                            if (currentValue === '' || currentValue.toLowerCase().includes('nao atribuido') || normalizeText(currentValue) !== normalizeText(bestOption)) {
                                row[role] = bestOption;
                                rowChanged = true;
                            }
                        }
                    }

                    if (!isAtualPreenchido) {
                        if (row[papelAtualDaLinhaDoTempo] && row.instrutorAtual !== row[papelAtualDaLinhaDoTempo]) {
                            row.instrutorAtual = row[papelAtualDaLinhaDoTempo];
                            rowChanged = true;
                        }
                    }

                    if (rowChanged) {
                        totalAlocacoesModificadas++;
                        tempDb[i] = row;
                    }

                    // Adiciona na lista geral de visualização do cenário
                    simulatedClasses.push({
                        id: row.id || 'Sem ID',
                        curso: row.curso,
                        modalidade: row.modalidade,
                        alunos: parseInt(row.alunos) || 0,
                        inicio: row.inicio,
                        changed: rowChanged,
                        antes: estadoAnterior,
                        depois: {
                            i1: row.instrutor1 || 'Não Atribuído',
                            i2: row.instrutor2 || 'Não Atribuído',
                            i3: row.instrutor3 || '',
                            atual: row.instrutorAtual || 'Não Atribuído'
                        }
                    });
                }

                // Abre a janela do simulador exibindo o cenário completo em qualquer situação
                setSimulator({
                    isOpen: true,
                    changes: simulatedClasses,
                    newDb: tempDb,
                    scope: scopeToUse,
                    variationId: (simulator.variationId || 0) + 1,
                    totalModificadas: totalAlocacoesModificadas
                });
            };

            const applySimulation = () => {
                const logs = addLog("Simulador IA", "Lote", "Inteligente", `Cenário aprovado pelo usuário. Escopo: ${simulator.scope === 'filtered' ? 'Mês Atual' : 'Geral'}.`);
                persist(simulator.newDb, substitutions, logs);
                setData(simulator.newDb);
                setSimulator({ ...simulator, isOpen: false });
                showNotify("✅ Distribuição do cenário aplicada com sucesso!", "success");
            };

const getBlockRolesForClass = (turma) => {
    return getClassInstructorRoles(turma);
};

const getDatesForBlockedRole = (rows, row, role) => {
    const dates = getFutureBalanceDates(rows).filter(dateStr => {
        const active = getActiveRoleOnBalanceDate(row, dateStr);
        return active && active.role === role;
    });

    if (dates.length > 0) return dates;

    const fallback = role === 'instrutor1'
        ? row.inicio
        : role === 'instrutor2'
            ? (row.dataTransferencia || row.inicio)
            : (row.dataTransferencia2 || row.dataTransferencia || row.inicio);

    return safeString(fallback).length === 10 ? [fallback] : [viewDate];
};

const getProjectedInstructorMetrics = (rows, instructorName, row, dates) => {
    const instNorm = normalizeText(instructorName);
    const courseKey = `${getSafeModalidade(row)}|${safeString(row.curso)}`;
    const loads = dates.map(dateStr => {
        let totalAlunos = 0;
        let sameCourse = 0;

        rows.forEach(item => {
            const active = getActiveRoleOnBalanceDate(item, dateStr);
            if (!active || normalizeText(active.inst) !== instNorm) return;

            totalAlunos += parseInt(item.alunos) || 0;

            const itemCourseKey = `${getSafeModalidade(item)}|${safeString(item.curso)}`;
            if (itemCourseKey === courseKey) sameCourse += 1;
        });

        return { totalAlunos, sameCourse };
    });

    const maxLoad = Math.max(...loads.map(x => x.totalAlunos), 0);
    const avgLoad = loads.length > 0 ? Math.round(loads.reduce((acc, x) => acc + x.totalAlunos, 0) / loads.length) : 0;
    const maxSameCourse = Math.max(...loads.map(x => x.sameCourse), 0);

    return { maxLoad, avgLoad, maxSameCourse };
};

const chooseReplacementForBlockedRole = (rows, rowIndex, role, blockedList, customPool = null) => {
    const row = rows[rowIndex];
    const blockedNorms = blockedList.map(normalizeText);
    const modalidade = getSafeModalidade(row);
    const roles = getBlockRolesForClass(row);
    const pool = customPool || uniqueInstrutores;
    const alreadyInClass = roles
        .filter(r => r !== role)
        .map(r => normalizeText(row[r]))
        .filter(Boolean);

    const dates = getDatesForBlockedRole(rows, row, role);

    return pool
        .filter(nome => {
            const norm = normalizeText(nome);
            if (!norm) return false;
            if (blockedNorms.includes(norm)) return false;
            if (alreadyInClass.includes(norm)) return false;
            const isTecnicaRole = modalidade === 'Técnica' || role === 'instrutor3';
            if (isTecnicaRole && !isTecnicaInstructor(nome)) return false;
            if (role === 'instrutor3' && !isTecnicaRole) return false;
            return true;
        })
        .map(nome => {
            const simulatedRows = rows.map((item, idx) => {
                if (idx !== rowIndex) return item;
                return { ...item, [role]: nome };
            });

            const metrics = getProjectedInstructorMetrics(simulatedRows, nome, row, dates);
            const worstDateInfo = dates
                .map(dateStr => getBalancePenaltyForSnapshot(getBalanceSnapshot(simulatedRows, dateStr)))
                .sort((a, b) => b.penalty - a.penalty)[0] || { effectiveMin: BALANCE_LIMITS.min, effectiveIdeal: BALANCE_LIMITS.ideal, effectiveMax: BALANCE_LIMITS.max };
            const effectiveMin = worstDateInfo.effectiveMin;
            const effectiveIdeal = worstDateInfo.effectiveIdeal;
            const effectiveMax = worstDateInfo.effectiveMax;

            let score = 0;
            score += Math.abs(metrics.avgLoad - effectiveIdeal) * 8;
            score += metrics.maxLoad * 2;
            score += metrics.maxSameCourse * 160;

            if (metrics.maxSameCourse > BALANCE_LIMITS.maxSameCourse) score += (metrics.maxSameCourse - BALANCE_LIMITS.maxSameCourse) * 3000;
            if (metrics.maxLoad > effectiveMax) score += (metrics.maxLoad - effectiveMax) * 500;
            if (metrics.maxLoad > BALANCE_LIMITS.hardMax) score += 100000;
            if (metrics.maxLoad >= effectiveMin && metrics.maxLoad <= effectiveMax) score -= 1200;
            if (metrics.maxLoad < effectiveMin) score -= (effectiveMin - metrics.maxLoad) * 12;

            return { nome, score, ...metrics };
        })
        .sort((a, b) => a.score - b.score);
};

const redistributeBlockedInstructorRoles = (sourceRows, blockedList = blockedInstructors, customPool = null) => {
    const blockedNorms = [...new Set((blockedList || []).map(normalizeText).filter(Boolean))];
    const activePool = [...new Set((customPool || uniqueInstrutores).map(safeString).filter(Boolean))]
        .filter(nome => !blockedNorms.includes(normalizeText(nome)));

    let newRows = (sourceRows || []).map(row => ({
        ...row,
        autoAssignedLogs: normalizeAutoAssignedLogs(row.autoAssignedLogs)
    }));

    const changes = [];
    const unresolved = [];

    newRows.forEach((row, rowIndex) => {
        getBlockRolesForClass(row).forEach(role => {
            const oldName = safeString(row[role]);
            const oldNorm = normalizeText(oldName);
            if (!oldNorm || !blockedNorms.includes(oldNorm)) return;

            const oldCanonical = getCanonical(oldName);
            const options = chooseReplacementForBlockedRole(newRows, rowIndex, role, blockedNorms, activePool);
            const chosen = options[0];

            if (!chosen) {
                newRows[rowIndex] = {
                    ...newRows[rowIndex],
                    [role]: '',
                    autoAssignedLogs: {
                        ...(newRows[rowIndex].autoAssignedLogs || {}),
                        [role]: {
                            nome: '',
                            type: 'blocked-unresolved',
                            reason: `${oldCanonical} foi desligado/bloqueado, mas não houve substituto seguro disponível.`
                        }
                    }
                };
                unresolved.push(`Turma ${row.id} / ${role}`);
                return;
            }

            newRows[rowIndex] = {
                ...newRows[rowIndex],
                [role]: chosen.nome,
                autoAssignedLogs: {
                    ...(newRows[rowIndex].autoAssignedLogs || {}),
                    [role]: {
                        nome: chosen.nome,
                        type: 'blocked-redistribution',
                        reason: `${oldCanonical} foi desligado/bloqueado. Redistribuído por equilíbrio mensal: carga máxima prevista ${chosen.maxLoad} alunos.`
                    }
                }
            };

            changes.push({
                turmaId: row.id,
                curso: row.curso,
                modalidade: row.modalidade,
                role,
                from: oldCanonical,
                to: chosen.nome
            });
        });
    });

    const balanceResult = changes.length > 0
        ? executeChronologicalAutoBalance(newRows, new Set(), activePool)
        : { rows: newRows, moves: [], remainingIssues: [] };

    return {
        rows: balanceResult.rows,
        changes,
        unresolved,
        balanceMoves: balanceResult.moves,
        remainingIssues: balanceResult.remainingIssues
    };
};

const handleBlockInstructor = (instructorName) => {
    const cleanName = getCanonical(instructorName);
    const blockNorm = normalizeText(cleanName);

    if (!blockNorm) {
        showNotify("Instrutor inválido para bloqueio.", "error");
        return;
    }

    if (blockedInstructors.includes(blockNorm)) {
        showNotify(`${cleanName} já está bloqueado no sistema.`, "error");
        return;
    }

    const affected = data.reduce((acc, row) => {
        return acc + getBlockRolesForClass(row).filter(role => normalizeText(row[role]) === blockNorm).length;
    }, 0);

    const ok = window.confirm(
        `Bloquear ${cleanName}?\n\n` +
        `O instrutor sairá das listas do sistema e ${affected} posição(ões) de turma serão redistribuídas automaticamente respeitando carga, curso, técnica e futuros instrutores da mesma turma.`
    );

    if (!ok) return;

    const nextBlocked = [...new Set([...blockedInstructors, blockNorm])];
    const redistribution = redistributeBlockedInstructorRoles(data, nextBlocked);
    const newRows = redistribution.rows;
    const changes = redistribution.changes;
    const unresolved = redistribution.unresolved;

    const nextWhitelist = tecnicaWhitelist.filter(nome => normalizeText(nome) !== blockNorm);
    setTecnicaWhitelist(nextWhitelist);
    localStorage.setItem('senacWhitelist_v1', JSON.stringify(nextWhitelist));

    setBlockedInstructors(nextBlocked);
    localStorage.setItem(BLOCK_KEY, JSON.stringify(nextBlocked));
    const nextExtraInstructors = extraInstructors.filter(nome => normalizeText(nome) !== blockNorm);
    setExtraInstructors(nextExtraInstructors);
    localStorage.setItem(EXTRA_INSTRUCTORS_KEY, JSON.stringify(nextExtraInstructors));

    const logEntry = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        type: "Bloqueio de Instrutor",
        classId: cleanName,
        before: `${cleanName} ativo na base.`,
        after: `Bloqueado. ${changes.length} posição(ões) redistribuída(s). ${redistribution.balanceMoves.length} ajuste(s) cronológico(s). ${unresolved.length} sem substituto. Meta: diferença máxima de ${BALANCE_LIMITS.maxGap} alunos por mês quando matematicamente possível.`
    };

    persist(newRows, substitutions, [logEntry, ...logs], nextBlocked);
    setSelectedInstructorDetail(null);

    if (unresolved.length > 0) {
        showNotify(`Instrutor bloqueado, mas ${unresolved.length} posição(ões) ficaram sem substituto seguro.`, "error");
    } else {
        showNotify(`${cleanName} bloqueado: ${changes.length} posição(ões) redistribuída(s), meta mensal ${BALANCE_LIMITS.maxGap} alunos.`, "success");
    }
};

useEffect(() => {
    if (!user) return;
    if (!data || data.length === 0) return;
    if (isSaving) return;
    if (blockedCleanupRunningRef.current) return;

    const affectedRows = data.filter(row => {
        return getBlockRolesForClass(row).some(role => isBlockedInstructorName(row[role]));
    });

    if (affectedRows.length === 0) return;

    blockedCleanupRunningRef.current = true;
    const affectedNames = [...new Set(affectedRows.flatMap(row => {
        return getBlockRolesForClass(row)
            .map(role => row[role])
            .filter(nome => isBlockedInstructorName(nome))
            .map(nome => getCanonical(nome));
    }))].filter(Boolean);

    const redistribution = redistributeBlockedInstructorRoles(data, blockedInstructors);
    const logEntry = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        type: "Redistribuição Automática de Bloqueados",
        classId: affectedNames.join(', ') || 'Instrutores bloqueados',
        before: `${affectedRows.length} turma(s) ainda tinham instrutor bloqueado (${affectedNames.join(', ') || 'bloqueados'}).`,
        after: `${redistribution.changes.length} posição(ões) redistribuída(s), ${redistribution.balanceMoves.length} ajuste(s) cronológico(s), ${redistribution.unresolved.length} sem substituto. Regra ativa: diferença máxima de ${BALANCE_LIMITS.maxGap} alunos por mês quando possível.`
    };

    persist(redistribution.rows, substitutions, [logEntry, ...logs], blockedInstructors)
        .finally(() => {

            const getRankedAnalystOptions = (targetCourse, pendingData = [], customPool = null) => {

            const getRoleActiveOnImportDate = (row, referenceDateStr) => {

                if (start && ref < start) return '';
                if (end && ref > end) return '';

                            }

                            const headRow = jsonData[headIdx].map(c => normalizeText(safeString(c)));
