                                    const { resultItem, autoAssigned } = smartAssignClass(item, newRows, combinedInsts, combinedAnalysts);
                                    if (Object.keys(autoAssigned).length > 0) {

                            if(newRows.length > 0) { 
                                const dataMap = new Map();
                                data.forEach(d => dataMap.set(String(d.id), d));
                                
                                let newOrUpdatedCount = 0;
                                newRows.forEach(row => {
                                    dataMap.set(String(row.id), row);
                                    newOrUpdatedCount++;
                                });
                                
                                let mergedData = Array.from(dataMap.values());
                                
                                // === INTEGRAÇÃO AUTOMÁTICA NO UPLOAD (COM OPÇÃO DE ESCOLHA) ===
                                try {
                                    const parseSecureDate = (str) => {
                                        if (!str) return null;
                                        const parts = String(str).split('/');
                                        if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
                                        return new Date(str + 'T00:00:00');
                                    };

                                    // 1. A PERGUNTA CRUCIAL PARA O USUÁRIO
                                    const usarIA = window.confirm("Deseja realizar uma Nova Distribuição com a IA?\n\n[OK] = A IA vai preencher os instrutores em branco.\n[CANCELAR] = Manter a base offline intacta (mantém os vazios como vieram).");

                                    let listaReais = new Set();
                                    mergedData.forEach(d => {
                                        if (d.instrutor1 && d.instrutor1.trim().length > 1) listaReais.add(d.instrutor1.trim());
                                        if (d.instrutor2 && d.instrutor2.trim().length > 1) listaReais.add(d.instrutor2.trim());
                                        if (d.instrutor3 && d.instrutor3.trim().length > 1) listaReais.add(d.instrutor3.trim());
                                        if (d.instrutorAtual && d.instrutorAtual.trim().length > 1 && !d.instrutorAtual.toLowerCase().includes('nao atribuido')) {
                                            listaReais.add(d.instrutorAtual.trim());
                                        }
                                    });
                                    const arrayReais = Array.from(listaReais);
                                    const dataAlvoOtimizacao = parseSecureDate(viewDate) || new Date();

                                    for (let i = 0; i < mergedData.length; i++) {
                                        let row = { ...mergedData[i] };
                                        let rowChanged = false;

                                        let roles = ['instrutor1', 'instrutor2'];

                                        if (usarIA) {
                                            for (let role of roles) {

                                                if (currentValue === '' || currentValue.includes('nao atribuido') || currentValue === 'undefined') {
                                                    const alreadyInClass = roles.map(r => row[r]).filter(Boolean);
                                                    const options = getBalancedInstructorOptions(row, role, alreadyInClass, [], arrayReais, null, mergedData);
                                                    
                                                    if (options && options.length > 0 && options[0].nome.trim().length > 1) {
                                                        row[role] = options[0].nome;
                                                        rowChanged = true;
                                                    }
                                                }
                                            }
                                        }

                                        // 3. REGRA DO INSTRUTOR ATUAL (Sempre roda, independente da IA)
                                        // Garante que o painel mostre o instrutor correto baseado nas datas de passagem
                                        const currentInstVal = String(row.instrutorAtual || '').trim();
                                        const isAtualVazio = currentInstVal === '' || currentInstVal.toLowerCase().includes('nao atribuido') || currentInstVal === 'undefined';

                                        if (isAtualVazio) {
                                            const dTrans1 = parseSecureDate(row.dataTransferencia);

                                            if (row.modalidade === 'Técnica') {

                                            } else {

                                            }

                                            // Copia o nome de quem deveria estar regendo a turma hoje para o "Instrutor Atual"
                                            if (row[papelAtualDaLinhaDoTempo] && row.instrutorAtual !== row[papelAtualDaLinhaDoTempo]) {
                                                row.instrutorAtual = row[papelAtualDaLinhaDoTempo];
                                                rowChanged = true;
                                            }
                                        }

                                        if (rowChanged) mergedData[i] = row;
                                    }
                                } catch (aiError) {

                                mergedData = JSON.parse(JSON.stringify(mergedData));
                                const newLogs = addLog("Importação", "Lote", "Inteligente", `${newOrUpdatedCount} turmas carregadas.`);
                                
                                persist(mergedData, substitutions, newLogs);
                                setData(mergedData); 
                                
                                if (typeof batchSummary !== 'undefined' && batchSummary.length > 0) {

                                    showNotify(`Sucesso! Planilha processada e o Instrutor Atual foi sincronizado com as datas de passagem!`, "success"); 
                                }
                                // ============================================================================
                               
                            }
                        }
                    } catch (err) { showNotify("Erro ao ler arquivo. Verifique se é um Excel válido.", "error"); }
                };
                reader.readAsArrayBuffer(file); e.target.value = null;
            };

            const handleCreateClass = (e) => { 
                e.preventDefault(); 
                const { resultItem, autoAssigned } = smartAssignClass({ ...newClass, alunos: parseInt(newClass.alunos)||0 });
                const duplicateInstructor = getDuplicateInstructorInClass(resultItem);
                if (duplicateInstructor) {
                    showNotify("Erro: o mesmo instrutor não pode ser Instrutor 1, 2 ou 3 na mesma turma.", "error");
                    return;
                }
                const newLogs = addLog("Criação", resultItem.id, "Inexistente", `Criada: ${resultItem.curso} (${resultItem.alunos} alunos) [${resultItem.modalidade}]`);
                
                const existingIdx = data.findIndex(d => String(d.id) === String(resultItem.id));
                let newData = [...data];
                if (existingIdx >= 0) {
                    newData[existingIdx] = resultItem;
                } else {
                    newData.push(resultItem);
                }

                persist(newData, substitutions, newLogs); 
                setIsFormOpen(false); 
                setNewClass({ id: '', modalidade: 'Aperfeiçoamento', curso: 'Administrativo', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', instrutor3: '', dataTransferencia: '', dataTransferencia2: '' }); 
                
                if (Object.keys(autoAssigned).length > 0) {
                    setImportSummaryModal([{ turmaId: resultItem.id, curso: resultItem.curso, modalidade: resultItem.modalidade, changes: autoAssigned }]);
                } else {
                    showNotify("Turma salva com sucesso!");
                }
            };
            
            const handleCreateSub = (e) => { 
                e.preventDefault(); 
                if (newSub.isDefinitive) {
                    const newData = data.map(d => {
                        if (String(d.id) === String(newSub.turmaId)) {

                setNewSub({ isDefinitive: false, dataInicio: '', dataFim: '', turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '' }); 
            };
            
            const ClassChain = ({ cls, currentInst }) => {

                const getRoleLog = (role) => {
                    if (!cls.autoAssignedLogs || typeof cls.autoAssignedLogs !== 'object') return null;
                    return cls.autoAssignedLogs[role] || null;
                };
                const renderInstructorStep = (role, label, colorClass, activeColorClass) => {
                    const roleLog = getRoleLog(role);
                    const isActive = getCanonical(cls[role]) === cInst;
                    const isPreserved = roleLog && roleLog.type === 'preserved-current';
                    const isBlockedRedistribution = roleLog && roleLog.type === 'blocked-redistribution';
                    const badge = roleLog ? (isPreserved ? 'Atual' : (isBlockedRedistribution ? 'Bloq.' : 'IA')) : '';

                        ? 'bg-blue-100 text-blue-700 border-blue-200'

                            ? 'bg-red-100 text-red-700 border-red-200'
                            : 'bg-purple-100 text-purple-700 border-purple-200');
                    const title = roleLog && roleLog.reason ? `${label}: ${roleLog.reason}` : label;

                    return (
                        <span className={`px-1.5 py-0.5 rounded border flex items-center gap-1 ${isActive ? activeColorClass : colorClass}`} title={title}>

                return (
                    <div className="mt-2 pt-2 border-t border-slate-100 flex flex-col gap-1 w-full bg-slate-50 p-2 rounded-lg">

                        <div className="flex items-center flex-wrap gap-x-1 gap-y-1 text-[10px] font-bold">
                            {renderInstructorStep('instrutor1', 'Instrutor 1 (Início)', 'bg-white text-slate-600 border-slate-300', 'bg-blue-600 text-white border-blue-700')}
                            
                            <span className="text-slate-300 text-[8px] font-black">➔</span>
                            {renderInstructorStep('instrutor2', 'Instrutor 2 (Passagem 1)', 'bg-white text-slate-600 border-slate-300', 'bg-green-600 text-white border-green-700 shadow')}
                            
                            {(isTecnica || cls.instrutor3) && (
                                <>
                                    <span className="text-slate-300 text-[8px] font-black">➔</span>
                                    {renderInstructorStep('instrutor3', 'Instrutor 3 (Passagem 2)', 'bg-white text-slate-600 border-slate-300', 'bg-purple-600 text-white border-purple-700 shadow')}
                                </>
                            )}
                        </div>
                    </div>
                )
            };

            const getRoleSignalLog = (row, role) => {
                const logs = normalizeAutoAssignedLogs(row.autoAssignedLogs);
                return logs && logs[role] ? logs[role] : null;
            };

            const SignalBadge = ({ log }) => {
                if (!log) return null;

                const type = typeof log === 'object' ? log.type : '';
                const reason = typeof log === 'object' ? log.reason : 'Preenchido automaticamente pelo sistema.';
                const label = type === 'preserved-current'
                    ? 'Atual'
                    : (type === 'blocked-redistribution'
                        ? 'Bloq.'
                        : (type === 'rebalance-future' ? 'Ajuste IA' : 'IA'));
                const badgeClass = type === 'preserved-current'
                    ? 'bg-blue-100 text-blue-700 border-blue-200'
                    : (type === 'blocked-redistribution'
                        ? 'bg-red-100 text-red-700 border-red-200'
                        : 'bg-purple-100 text-purple-700 border-purple-200');

                return <span title={reason} className={`text-[8px] leading-none px-1 py-0.5 rounded border font-black ${badgeClass}`}>{label}</span>;
            };

            const getOrganizedInstructorData = (instructorName) => {
                const fullProfile = globalInstructorStats[instructorName];
                if (!fullProfile) return null;

                const allInvolvedClasses = data.filter(d => getCanonical(d.instrutor1) === instructorName || getCanonical(d.instrutor2) === instructorName || getCanonical(d.instrutor3) === instructorName); 
                const target = new Date(viewDate + 'T00:00:00');
                const activeClasses = []; const incomingClasses = []; const outgoingClasses = []; const historyClasses = []; const futureClasses = [];
              
                const monthlyData = [];
                for (let i = 0; i < 6; i++) {
                    const monthDate = new Date(target.getFullYear(), target.getMonth() + i, 1);
                    const monthEnd = new Date(target.getFullYear(), target.getMonth() + i + 1, 0);
                    const monthLabel = monthDate.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
                    let studentsInMonth = 0;

                    allInvolvedClasses.forEach(cls => {
                        const start = new Date(cls.inicio + 'T00:00:00');
                        const end = new Date(cls.termino + 'T00:00:00');
                        
                        let events = [ { date: start, inst: getCanonical(cls.instrutor1) } ];
                        if (cls.dataTransferencia && cls.instrutor2) events.push({ date: new Date(cls.dataTransferencia + 'T00:00:00'), inst: getCanonical(cls.instrutor2) });
                        if (cls.dataTransferencia2 && cls.instrutor3) events.push({ date: new Date(cls.dataTransferencia2 + 'T00:00:00'), inst: getCanonical(cls.instrutor3) });
                        events.sort((a,b) => a.date - b.date);
                        events.push({ date: end, inst: null });
                        
                        for (let j = 0; j < events.length - 1; j++) {
                            if (events[j].inst === instructorName) {
                                let instStart = events[j].date;
                                let instEnd = events[j+1].date;
                                if (instStart <= monthEnd && instEnd >= monthDate) {
                                    studentsInMonth += parseInt(cls.alunos) || 0;
                                }
                            }
                        }
                    });
                    monthlyData.push({ month: monthLabel, alunos: studentsInMonth });
                }

                allInvolvedClasses.forEach(cls => {
                    const start = new Date(cls.inicio + 'T00:00:00'); 
                    const end = new Date(cls.termino + 'T00:00:00'); 
                    
                    let d1 = cls.dataTransferencia && cls.dataTransferencia.length === 10 ? new Date(cls.dataTransferencia + 'T00:00:00') : null;
                    let d2 = cls.dataTransferencia2 && cls.dataTransferencia2.length === 10 ? new Date(cls.dataTransferencia2 + 'T00:00:00') : null;
                    
                    let isInst1 = getCanonical(cls.instrutor1) === instructorName;
                    let isInst2 = getCanonical(cls.instrutor2) === instructorName;
                    let isInst3 = getCanonical(cls.instrutor3) === instructorName;

                    let transfDate = d1; let transfDate2 = d2;
                    let instA = cls.instrutor2; let instB = cls.instrutor3;
                    let rawDate1 = cls.dataTransferencia; let rawDate2 = cls.dataTransferencia2;
                    let tagA = 'P1'; let tagB = 'P2';

                    if (d1 && d2 && d2 < d1) {
                        transfDate = d2; transfDate2 = d1;
                        instA = cls.instrutor3; instB = cls.instrutor2;
                        rawDate1 = cls.dataTransferencia2; rawDate2 = cls.dataTransferencia;
                        tagA = 'P2'; tagB = 'P1';
                        let temp2 = isInst2; isInst2 = isInst3; isInst3 = temp2;
                    }

                    if (target < start) {
                        if (isInst1 || isInst2 || isInst3) { 
                            let prev = isInst1 ? "Titular (Início)" : (isInst2 ? `Receberá ${tagA}` : `Receberá ${tagB}`);
                            futureClasses.push({...cls, statusDetail: `Agendada (${prev})`}); 
                        }
                        return;
                    }

                    if (target > end) { historyClasses.push({...cls, statusDetail: 'Finalizada'}); return; }
                    
                    if (isInst1) {
                         if (transfDate && target > transfDate) { historyClasses.push({...cls, statusDetail: `Repassado (${tagA})`});
                         } else { activeClasses.push({...cls, statusDetail: transfDate ? 'Titular (A Transf.)' : 'Titular'}); if (transfDate) outgoingClasses.push({...cls, transferNote: `Passará para ${instA} em ${formatDatePTBR(rawDate1)}`}); }
                    } else if (isInst2) {
                        if (transfDate) {
                            if (target < transfDate) { incomingClasses.push({...cls, transferNote: `Receberá de ${cls.instrutor1} em ${formatDatePTBR(rawDate1)}`});
                            } else if (transfDate2 && target > transfDate2) { historyClasses.push({...cls, statusDetail: `Repassado (${tagB})`});
                            } else { activeClasses.push({...cls, statusDetail: transfDate2 ? 'Sucessor 1 (A Transf.)' : 'Sucessor'}); if (transfDate2) outgoingClasses.push({...cls, transferNote: `Passará para ${instB} em ${formatDatePTBR(rawDate2)}`}); }
                        }
                    } else if (isInst3) {
                         if (transfDate2) {
                             if (target < transfDate2) { incomingClasses.push({...cls, transferNote: `Receberá de ${instA} em ${formatDatePTBR(rawDate2)}`});
                             } else { activeClasses.push({...cls, statusDetail: 'Sucessor Final'}); }
                         }
                    }
                });

                substitutions.forEach(sub => {
                    if (getCanonical(sub.instrutorSubstituto) === instructorName) {
                        const subStart = new Date(sub.dataInicio + 'T00:00:00'); const subEnd = new Date(sub.dataFim + 'T00:00:00');
                        if (target >= subStart && target <= subEnd) {
                            const originalClass = data.find(d => String(d.id) === String(sub.turmaId));
                            if (originalClass) {
                                activeClasses.push({ ...originalClass, isSubstitution: true, subDataInicio: sub.dataInicio, subDataFim: sub.dataFim, statusDetail: `🔄 Cobrindo ${sub.instrutorAusente} até ${formatDatePTBR(sub.dataFim)}`, obs: sub.motivo });
                            }
                        }
                    }
                });
              
                activeClasses.sort((a,b) => new Date(a.inicio) - new Date(b.inicio)); 
                return { ...fullProfile, monthlyData, organized: { activeClasses, incomingClasses, outgoingClasses, historyClasses, futureClasses } };
            };

            const openInstructorModal = (instPartial) => { const detailed = getOrganizedInstructorData(instPartial.nome); if (detailed) { setSelectedInstructorDetail(detailed); } };

            const handleOpenTransferModal = (turmaObj) => {
                setNewSub({ ...newSub, isDefinitive: false, turmaId: String(turmaObj.id), instrutorAusente: selectedInstructorDetail.nome });
                setIsSubModalOpen(true);
                setSelectedInstructorDetail(null); 
            };
            
            const handleCopyImportSummary = () => {
                if (!importSummaryModal) return;
                
                let txt = "RELATÓRIO DE PREENCHIMENTO ATIVO - S.G.T\n";
                txt += "===========================================\n\n";
                
                importSummaryModal.forEach(item => {
                    txt += `Turma: ${item.turmaId}\n`;
                    txt += `Curso: ${item.curso} (${item.modalidade})\n`;
                    txt += `Intervenções em Vagas Abertas:\n`;
                    Object.entries(item.changes).forEach(([role, log]) => {
                        const nome = typeof log === 'object' ? log.nome : log;
                        const reason = typeof log === 'object' ? log.reason : 'Vaga preenchida';
                        txt += `  - ${role.replace('instrutor', 'Instrutor ')}: ${nome}\n    Motivo: ${reason}\n`;
                    });
                    txt += `-------------------------------------------\n`;
                });
                
                const textArea = document.createElement("textarea");
                textArea.value = txt;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showNotify("Relatório da IA copiado para a área de transferência!");
                } catch (err) {
                    showNotify("Erro ao copiar o texto.", "error");
                }
                document.body.removeChild(textArea);
            };

            const handleCopyEmail = (instructor, period) => {
                if (!instructor || !instructor.organized) return;
                const org = instructor.organized;
                
                let actFiltered = [];
                let incFiltered = [];
                let outFiltered = [];
                let futFiltered = [];
                let histFiltered = [];
                let periodText = "";

                if (period && period.start && period.end) {
                    const pStart = new Date(period.start + '-01T00:00:00');
                    const pEnd = new Date(period.end + '-01T00:00:00');
                    pEnd.setMonth(pEnd.getMonth() + 1);
                    pEnd.setDate(0); 

                    if (period.start === period.end) {
                        periodText = ` no período de <b>${getMonthName(period.start)}</b>`;
                    } else {
                        periodText = ` no período de <b>${getMonthName(period.start)} a ${getMonthName(period.end)}</b>`;
                    }

                    const instName = getCanonical(instructor.nome);
                    const allInvolvedClasses = data.filter(d => getCanonical(d.instrutor1) === instName || getCanonical(d.instrutor2) === instName || getCanonical(d.instrutor3) === instName);

                    const parseDStr = (str, fallback) => (str && str.length === 10) ? str : fallback;

                    allInvolvedClasses.forEach(cls => {
                        const dInicio = parseDStr(cls.inicio, '1970-01-01');
                        const dTermino = parseDStr(cls.termino, '2099-12-31');
                        const dTransf1 = parseDStr(cls.dataTransferencia, null);
                        const dTransf2 = parseDStr(cls.dataTransferencia2, null);

                        let slices = [];
                        if (getCanonical(cls.instrutor1) === instName) {
                            slices.push({
                                start: dInicio, end: dTransf1 || dTermino,
                                isTransfOut: !!dTransf1, transfOutDate: dTransf1, transfOutTo: cls.instrutor2,
                                isTransfIn: false, roleName: 'Titular'
                            });
                        }
                        if (getCanonical(cls.instrutor2) === instName) {
                            slices.push({
                                start: dTransf1 || dInicio, end: dTransf2 || dTermino,
                                isTransfIn: !!dTransf1, transfInDate: dTransf1, transfInFrom: cls.instrutor1,
                                isTransfOut: !!dTransf2, transfOutDate: dTransf2, transfOutTo: cls.instrutor3,
                                roleName: 'Sucessor 1'
                            });
                        }
                        if (getCanonical(cls.instrutor3) === instName) {
                            slices.push({
                                start: dTransf2 || dTransf1 || dInicio, end: dTermino,
                                isTransfIn: !!dTransf2, transfInDate: dTransf2, transfInFrom: cls.instrutor2 || cls.instrutor1,
                                isTransfOut: false, roleName: 'Sucessor Final'
                            });
                        }

                        slices.forEach(slice => {
                            const sDate = new Date(slice.start + 'T00:00:00');
                            const eDate = new Date(slice.end + 'T00:00:00');

                            if (sDate <= pEnd && eDate >= pStart) {
                                let clonedCls = { ...cls };
                                
                                const tInDate = slice.isTransfIn ? new Date(slice.transfInDate + 'T00:00:00') : null;
                                const tOutDate = slice.isTransfOut ? new Date(slice.transfOutDate + 'T00:00:00') : null;

                                const hasTransferInPeriod = tInDate && tInDate >= pStart && tInDate <= pEnd;
                                const hasTransferOutPeriod = tOutDate && tOutDate >= pStart && tOutDate <= pEnd;

                                if (hasTransferInPeriod) {
                                    clonedCls.transferNote = `Receberá de ${slice.transfInFrom} em ${formatDatePTBR(slice.transfInDate)}`;
                                    if (hasTransferOutPeriod) clonedCls.transferNote += ` | Repassará p/ ${slice.transfOutTo} em ${formatDatePTBR(slice.transfOutDate)}`;
                                    incFiltered.push(clonedCls);
                                } else if (hasTransferOutPeriod) {
                                    clonedCls.transferNote = `Passará para ${slice.transfOutTo} em ${formatDatePTBR(slice.transfOutDate)}`;
                                    outFiltered.push(clonedCls);
                                } else {
                                    clonedCls.statusDetail = slice.roleName;
                                    actFiltered.push(clonedCls);
                                }
                            }
                        });
                    });

                    substitutions.forEach(sub => {
                        if (getCanonical(sub.instrutorSubstituto) === instName) {
                            const subS = new Date(sub.dataInicio + 'T00:00:00');
                            const subE = new Date(sub.dataFim + 'T00:00:00');
                            if (subS <= pEnd && subE >= pStart) {
                                const originalClass = data.find(d => String(d.id) === String(sub.turmaId));
                                if (originalClass) {
                                    actFiltered.push({ ...originalClass, isSubstitution: true, statusDetail: `🔄 Cobrindo ${sub.instrutorAusente} até ${formatDatePTBR(sub.dataFim)}`, obs: sub.motivo });
                                }
                            }
                        }
                    });

                    const uniqueById = (arr) => Array.from(new Map(arr.map(a => [a.id, a])).values());
                    actFiltered = uniqueById(actFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    incFiltered = uniqueById(incFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    outFiltered = uniqueById(outFiltered).sort((a,b) => new Date(a.inicio) - new Date(b.inicio));
                    
                    futFiltered = []; 
                    histFiltered = [];

                } else {
                    actFiltered = [...org.activeClasses];
                    incFiltered = [...org.incomingClasses];
                    outFiltered = [...org.outgoingClasses];
                    futFiltered = [...org.futureClasses];
                    histFiltered = [...org.historyClasses];
                }

                // NOVO: Aplica o filtro de Analista caso tenha sido selecionado!
                if (period && period.analista) {
                    const filterFn = (arr) => arr.filter(t => normalizeText(t.analista) === normalizeText(period.analista));
                    actFiltered = filterFn(actFiltered);
                    incFiltered = filterFn(incFiltered);
                    outFiltered = filterFn(outFiltered);
                    futFiltered = filterFn(futFiltered);
                    histFiltered = filterFn(histFiltered);
                    periodText += `<br/><span style="color: #4f46e5; font-size: 11px;">🎯 Filtro Aplicado: Apenas turmas sob responsabilidade de <b>${period.analista}</b></span>`;
                }

                let html = `<div style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #333333; line-height: 1.4;">`;
                html += `<p style="margin-bottom: 12px;">Prezado(a) Instrutor(a) <strong style="color: #1e3a8a; font-size: 15px;">${safeString(instructor.nome)}</strong>,<br/>Segue o panorama atualizado das suas distribuições no sistema${periodText}:</p>`;

                const buildBlock = (title, colorHex, bgColor, classes, infoType) => {
                    if (classes.length === 0) return '';
                    let block = `<div style="margin-bottom: 12px; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden;">`;
                    block += `<div style="background-color: ${bgColor}; padding: 6px 12px; border-bottom: 2px solid ${colorHex};">`;
                    block += `<h3 style="margin: 0; color: ${colorHex}; font-size: 13px; text-transform: uppercase;">${title} (${classes.length})</h3></div>`;
                    
                    block += `<table style="width: 100%; border-collapse: collapse; background-color: #ffffff;">`;
                    classes.forEach((t, index) => {
                        let info = infoType === 'status' ? t.statusDetail : (infoType === 'transfer' ? t.transferNote : t.statusDetail);
                        let borderStyle = index < classes.length - 1 ? 'border-bottom: 1px solid #f3f4f6;' : '';
                        
                        block += `<tr>
                            <td style="padding: 6px 12px; ${borderStyle} width: 60%; vertical-align: middle;">
                                <div style="font-weight: bold; font-size: 13px; color: #1f2937; margin-bottom: 2px;">Turma ${safeString(t.id)}</div>
                                <div style="color: #6b7280; font-size: 11px;">${safeString(t.curso)} (${safeString(t.modalidade)})</div>
                            </td>
                            <td style="padding: 6px 12px; ${borderStyle} text-align: right; width: 40%; vertical-align: middle;">
                                <div style="display: inline-block; background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: ${colorHex}; margin-bottom: 3px;">${info}</div>
                                <div style="font-size: 10px; color: #4b5563;">Início: <b>${formatDatePTBR(t.inicio)}</b><br/>Término: <b>${formatDatePTBR(t.termino)}</b></div>
                            </td>
                        </tr>`;
                    });
                    block += `</table></div>`;
                    return block;
                };

                html += buildBlock('📌 Turmas Atuais (Em Vigência)', '#1d4ed8', '#eff6ff', actFiltered, 'status'); 
                html += buildBlock('📥 Turmas A Receber', '#c2410c', '#fff7ed', incFiltered, 'transfer'); 
                html += buildBlock('📤 Turmas A Repassar', '#047857', '#ecfdf5', outFiltered, 'transfer'); 
                html += buildBlock('⏳ Turmas Futuras (Agendadas)', '#4338ca', '#eef2ff', futFiltered, 'inicio'); 
                html += buildBlock('✅ Turmas Finalizadas / Já Repassadas', '#475569', '#f1f5f9', histFiltered, 'status'); 
                
                if (actFiltered.length === 0 && incFiltered.length === 0 && outFiltered.length === 0 && futFiltered.length === 0 && histFiltered.length === 0) {
                    html += `<div style="padding: 15px; border: 1px dashed #cbd5e1; border-radius: 6px; background-color: #f8fafc; text-align: center; color: #64748b; font-size: 12px; margin-bottom: 12px;">Nenhuma turma vinculada a você ativa ou prevista para este filtro/período.</div>`;
                }

                html += `<p style="margin-top: 15px; font-size: 11px; color: #6b7280; border-top: 1px solid #e5e7eb; padding-top: 10px;">Atenciosamente,<br/><strong style="color: #374151;">Equipe de Gestão de Turmas - Senac PR</strong></p>`;
                html += `</div>`;

                const dummyElement = document.createElement('span');
                dummyElement.textContent = "Copiando...";
                document.body.appendChild(dummyElement);

                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(dummyElement);
                selection.removeAllRanges();
                selection.addRange(range);

                const clipboardListener = function(e) {
                    e.preventDefault();
                    e.clipboardData.setData('text/html', html);
                    e.clipboardData.setData('text/plain', "Resumo de Turmas copiado para colar no Outlook.");
                };

                document.addEventListener('copy', clipboardListener);

                try {
                    const ok = document.execCommand('copy');
                    if (ok) {
                        showNotify("Resumo Visual Enxuto copiado! Abra o Outlook e pressione Ctrl+V.");
                    } else {
                        throw new Error("Copy command failed");
                    }
                } catch (err) {
                    showNotify("O navegador bloqueou a cópia formatada. Tente novamente.", "error");
                } finally {
                    document.removeEventListener('copy', clipboardListener);
                    selection.removeAllRanges();
                    document.body.removeChild(dummyElement);
                }
            };

            const exportReport = (dataToExport, name) => { 
                try { 
                    let finalDataForExcel = [];

                    // 1. Se for o Relatório Geral
                    if (name.includes('geral')) {
                        // Mapeamento EXATO e blindado. A ordem aqui é a ordem que sai no Excel.
                        finalDataForExcel = dataToExport.map(row => ({
                            "Turma": safeString(row.id),
                            "Modalidade": safeString(row.modalidade),
                            "Curso": safeString(row.curso),
                            "Analista": safeString(row.analista),
                            "Alunos": parseInt(row.alunos) || 0,
                            "Início": formatDatePTBR(row.inicio),
                            "Término": formatDatePTBR(row.termino),
                            "Passagem 1": formatDatePTBR(row.dataTransferencia),
                            "Passagem 2": formatDatePTBR(row.dataTransferencia2),
                            "Instrutor 1": safeString(row.instrutor1),
                            "Instrutor 2": safeString(row.instrutor2),
                            "Instrutor 3": safeString(row.instrutor3),
                            "Instrutor Atual": safeString(row.instrutorAtual),
                            "Situação": safeString(row.status || 'Ativa')
                        }));
                    } 
                    // 2. Se for o Relatório de Substituições
                    else if (name.includes('subs')) {
                         finalDataForExcel = dataToExport.map(row => ({
                            "Turma": safeString(row.turmaId),
                            "Motivo/Obs": safeString(row.motivo),
                            "Instrutor Ausente": safeString(row.instrutorAusente),
                            "Instrutor Substituto": safeString(row.instrutorSubstituto),
                            "Data Início": formatDatePTBR(row.dataInicio),
                            "Data Fim": formatDatePTBR(row.dataFim),
                            "Definitiva?": row.isDefinitive ? "Sim" : "Não"
                         }));
                    } 
                    // 3. Se for o Histórico de Logs
                    else {
                         finalDataForExcel = dataToExport.map(row => ({
                            "Data/Hora": new Date(row.timestamp).toLocaleString('pt-BR'),
                            "ID Turma": safeString(row.classId),
                            "Tipo de Ação": safeString(row.type),
                            "Dado Anterior": safeString(row.before),
                            "Dado Novo": safeString(row.after)
                         }));
                    }

                    // Agora entregamos o dado limpo e em português para a biblioteca
                    const ws = XLSX.utils.json_to_sheet(finalDataForExcel); 
                    const wb = XLSX.utils.book_new(); 
                    XLSX.utils.book_append_sheet(wb, ws, "Relatório"); 
                    XLSX.writeFile(wb, `${name}.xlsx`); 
                    
                } catch (err) { 
                    console.error("Erro no Excel:", err);
                    showNotify("Erro ao exportar o arquivo excel.", "error");
                } 
            };
            
            const subDaysCount = useMemo(() => {
                if (!newSub.dataInicio || !newSub.dataFim || newSub.isDefinitive) return 0;
                const start = new Date(newSub.dataInicio); const end = new Date(newSub.dataFim);
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                return diffDays > 0 ? diffDays : 0;
            }, [newSub.dataInicio, newSub.dataFim, newSub.isDefinitive]);

            const isCopyValid = emailPeriod.start && emailPeriod.end && emailPeriod.start <= emailPeriod.end;

            // Variáveis do relatório Estatístico (NOVO)
            const totalInstrutoresAtivos = dashboardInstructors.length;
            const totalAlunosGeral = dashboardInstructors.reduce((acc, inst) => acc + inst.totalAlunos, 0);
            const mediaAlunosPorInstrutor = totalInstrutoresAtivos > 0 ? Math.round(totalAlunosGeral / totalInstrutoresAtivos) : 0;
            // === IA: PREENCHEDOR DE VAGAS COM CRONOLOGIA PERFEITA ===
            const autoFillEmptySlots = () => {
                if (!window.confirm("A IA vai preencher as vagas identificando em qual fase da linha do tempo a turma está hoje. O Instrutor Atual será respeitado. Deseja continuar?")) return;

                let newData = [...data];
                let changedCount = 0;

                const parseSecureDate = (str) => {
                    if (!str) return null;
                    const parts = String(str).split('/');
                    if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
                    return new Date(str + 'T00:00:00');
                };

                let listaReais = new Set();
                newData.forEach(d => {
                    if (d.instrutor1 && d.instrutor1.trim().length > 1) listaReais.add(d.instrutor1.trim());
                    if (d.instrutor2 && d.instrutor2.trim().length > 1) listaReais.add(d.instrutor2.trim());
                    if (d.instrutor3 && d.instrutor3.trim().length > 1) listaReais.add(d.instrutor3.trim());
                    if (d.instrutorAtual && d.instrutorAtual.trim().length > 1 && !d.instrutorAtual.toLowerCase().includes('nao atribuido')) {
                        listaReais.add(d.instrutorAtual.trim());
                    }
                });
                const arrayReais = Array.from(listaReais);
                const dataAlvoOtimizacao = parseSecureDate(viewDate) || new Date();

                for (let i = 0; i < newData.length; i++) {
                    let row = { ...newData[i] };
                    let rowChanged = false;

                    let roles = ['instrutor1', 'instrutor2'];
                    if (row.modalidade === 'Técnica') roles = ['instrutor1', 'instrutor2', 'instrutor3'];

                    const currentInstVal = String(row.instrutorAtual || '').trim();
                    const isAtualVazio = currentInstVal === '' || currentInstVal.toLowerCase().includes('nao atribuido') || currentInstVal === 'undefined';

                    // 1. DESCOBRE A FASE ATUAL
                    const dTrans1 = parseSecureDate(row.dataTransferencia);
                    const dTrans2 = parseSecureDate(row.dataTransferencia2);
                    let papelAtualDaLinhaDoTempo = 'instrutor1';

                    if (row.modalidade === 'Técnica') {
                        if (dTrans1 && dataAlvoOtimizacao >= dTrans1) papelAtualDaLinhaDoTempo = 'instrutor2';
                        if (dTrans2 && dataAlvoOtimizacao >= dTrans2) papelAtualDaLinhaDoTempo = 'instrutor3';
                    } else {
                        if (dTrans1 && dataAlvoOtimizacao >= dTrans1) papelAtualDaLinhaDoTempo = 'instrutor2';
                    }

                    // 2. O INSTRUTOR ATUAL DA PLANILHA ASSUME A CADEIRA DA FASE DE HOJE
                    if (!isAtualVazio) {
                        if (!row[papelAtualDaLinhaDoTempo] || String(row[papelAtualDaLinhaDoTempo]).trim() === '') {
                            row[papelAtualDaLinhaDoTempo] = currentInstVal;
                            rowChanged = true;
                        }
                    }

                    // 3. IA PREENCHE AS CADEIRAS VAZIAS DO PASSADO OU FUTURO
                    for (let role of roles) {
                        const val = String(row[role] || '').trim().toLowerCase();
                        if (val === '' || val.includes('nao atribuido') || val === 'undefined') {
                            const alreadyInClass = roles.map(r => row[r]).filter(Boolean);
                            const options = getBalancedInstructorOptions(row, role, alreadyInClass, [], arrayReais, null, newData);
                            
                            if (options && options.length > 0 && options[0].nome.trim().length > 1) {
                                row[role] = options[0].nome;
                                rowChanged = true;
                                changedCount++;
                            }
                        }
                    }

                    // 4. ATUALIZA O "INSTRUTOR ATUAL" SE ELE ESTAVA VAZIO, USANDO O NOME DA FASE CORRETA
                    if (isAtualVazio) {
                        if (row[papelAtualDaLinhaDoTempo] && row.instrutorAtual !== row[papelAtualDaLinhaDoTempo]) {
                            row.instrutorAtual = row[papelAtualDaLinhaDoTempo];
                            rowChanged = true;
                        }
                    }

                    if (rowChanged) newData[i] = row;
                }

                if (changedCount > 0 || newData !== data) {
                    newData = JSON.parse(JSON.stringify(newData));
                    persist(newData, substitutions, addLog("IA: Linha do Tempo", "SISTEMA", "Múltiplas", "Ajuste estrito de cadeia docente realizado via botão."));
                    setData(newData);
                    alert(`✅ Processamento concluído! O sistema identificou o momento atual das turmas e alocou os professores futuros e passados.`);
                } else {
                    alert("✅ Todos os dados já estão alinhados cronologicamente.");
                }
            };
                    // === O DESENHO DO SISTEMA COMEÇA AQUI ===
            return (
                <div className="min-h-screen bg-slate-100 flex flex-col pb-10">
                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                    {notification && (<div className={`custom-alert fade-in ${notification.type === 'error' ? 'bg-red-600' : 'bg-emerald-600'} text-white`}>{notification.type === 'error' ? <Icons.Alert /> : <Icons.Check />}<span className="font-bold">{safeString(notification.msg)}</span></div>)}

                    <div className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm header-bar no-print">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-4"><img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Senac_logo.svg" alt="Senac" className="h-10 w-auto" /><div className="border-l border-gray-300 pl-4 h-8 flex items-center"><h1 className="text-xl font-bold text-slate-800 tracking-tight">Portal da Supervisão</h1></div></div>
                            <div className="flex items-center gap-6">
                                <button onClick={handleFullBackupExport} className="px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold text-xs flex gap-1 items-center shadow-lg transition border border-indigo-500 animate-pulse hover:animate-none"><Icons.Sync /> Backup</button>
                                {LOCAL_TEST_MODE && <span className="px-3 py-2 bg-amber-100 text-amber-800 border border-amber-200 rounded-lg font-bold text-xs uppercase tracking-wide">Modo Local</span>}
                                <div className="flex flex-col items-end">{isSaving ? (<div className="flex items-center gap-2 text-orange-500"><div className="loading-icon"><Icons.Refresh /></div><span className="text-xs font-bold uppercase tracking-wide">Salvando...</span></div>) : (<div className="flex items-center gap-1 text-green-600"><Icons.Check /><span className="text-xs font-bold uppercase tracking-wide">Dados Salvos (v100)</span></div>)}<span className="text-[10px] text-gray-400">{lastSaved ? `Sync: ${lastSaved.toLocaleTimeString()}` : 'Pronto'}</span></div>
                                
                                {/* BOTÕES DE AÇÃO PRINCIPAIS */}
                                <div className="flex gap-2">
                                    <button onClick={autoFillEmptySlots} className="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105 border border-emerald-400" title="Preencher Instrutor 1, 2 ou 3 que estiverem em branco">
                                        <Icons.UserPlus /> Preencher Vazios (IA)
                                    </button> 
                                    
                                    <button onClick={() => openSimulator('all', false)} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105" title={`Abre o Simulador de Equilíbrio sugerindo mudanças`}>
                                        <Icons.Robot /> Equilibrar Turmas
                                    </button>

                                    <button onClick={() => setIsSubModalOpen(true)} className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-bold text-sm flex gap-2 items-center shadow-sm transition hover:scale-105"><Icons.Switch /> Transferir</button>
