<script>
      // Altere para false quando quiser voltar a usar Firebase.
      window.SGT_LOCAL_TEST_MODE = false;
      window.sgtFirebaseError = null;
      window.sgtFirebaseReady = new Promise((resolve, reject) => {
        window.sgtResolveFirebaseReady = resolve;
        window.sgtRejectFirebaseReady = reject;
      });
    </script>
<script type="module">
      // MODO TESTE LOCAL:
      // true  = não importa Firebase, não lê nuvem e não grava nuvem.
      // false = volta a usar Firebase normalmente.
      const LOCAL_TEST_MODE = window.SGT_LOCAL_TEST_MODE === true;

      const sgtFirebaseBoot = (async () => {
        if (LOCAL_TEST_MODE) {
          window.remoteDB = null;
          window.dbMethods = null;
          window.auth = null;
          window.authMethods = {
            signInWithEmailAndPassword: async () => ({ user: { email: "modo-teste-local@senac.local", localMode: true } }),
            onAuthStateChanged: (_auth, callback) => {
              setTimeout(() => callback({ email: "modo-teste-local@senac.local", localMode: true }), 0);
              return () => {};
            },
            signOut: async () => {
              console.log("Modo teste local ativo: logout Firebase ignorado.");
            }
          };
          return { localMode: true };
        }

        try {
          const [
            { initializeApp },
            firestoreModule,
            authModule
          ] = await Promise.all([
            import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"),
            import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),
            import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js")
          ]);

          const { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, writeBatch, onSnapshot } = firestoreModule;
          const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } = authModule;

          const firebaseConfig = {
            apiKey: "AIzaSyAdjsftZXsQ00waKGsLDeY7lDqRgeU_DnM",
            authDomain: "sgt-senac.firebaseapp.com",
            projectId: "sgt-senac",
            storageBucket: "sgt-senac.firebasestorage.app",
            messagingSenderId: "278613531988",
            appId: "1:278613531988:web:51af3366f7199c274b3cc1"
          };

          const app = initializeApp(firebaseConfig);
          const db = getFirestore(app);
          const auth = getAuth(app);

          window.remoteDB = db;
          window.dbMethods = {
            collection, getDocs, addDoc, updateDoc, deleteDoc, doc, setDoc, writeBatch, onSnapshot
          };

          window.auth = auth;
          window.authMethods = {
            signInWithEmailAndPassword, onAuthStateChanged, signOut
          };

          return { localMode: false, app, db, auth };
        } catch (error) {
          window.sgtFirebaseError = error;
          console.error("Falha ao inicializar Firebase:", error);
          throw error;
        }
      })();

      sgtFirebaseBoot
        .then((result) => {
          if (typeof window.sgtResolveFirebaseReady === 'function') window.sgtResolveFirebaseReady(result);
        })
        .catch((error) => {
          if (typeof window.sgtRejectFirebaseReady === 'function') window.sgtRejectFirebaseReady(error);
        });

      window.sgtFirebaseReady = sgtFirebaseBoot;
    </script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const safeString = (val) => {
            if (val === null || val === undefined) return "";
            if (typeof val === 'object') return ""; 
            return String(val);
        };

        const { useState, useEffect, useMemo, useRef, Component } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        // --- COMPONENTE DE TELA DE LOGIN ---
        const LoginScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            
           
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    if (window.sgtFirebaseReady && typeof window.sgtFirebaseReady.then === 'function') {
                        await window.sgtFirebaseReady;
                    }
                    if (!window.auth || !window.authMethods || !window.authMethods.signInWithEmailAndPassword) {
                        throw new Error('Firebase Auth ainda não está pronto.');
                    }
                    await window.authMethods.signInWithEmailAndPassword(window.auth, email.trim(), password);
                } catch (err) {
                    console.error(err);
                    const code = safeString(err && (err.code || err.message));
                    if (code.includes('auth/unauthorized-domain')) {
                        setError('Domínio do GitHub não autorizado no Firebase Authentication.');
                    } else if (code.includes('auth/invalid-credential') || code.includes('auth/wrong-password') || code.includes('auth/user-not-found')) {
                        setError('Acesso negado. Verifique se o e-mail e a senha estão corretos.');
                    } else {
                        setError(`Falha no login: ${code || 'Firebase não respondeu.'}`);
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">🔒</div>
                            <h2 className="text-2xl font-bold text-slate-800">Portal da Supervisão</h2>
                            <p className="text-sm text-slate-500 mt-2">Acesso restrito à equipe pedagógica.</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-200 font-bold text-center">{error}</div>}
                        <form onSubmit={handleLogin} className="flex flex-col gap-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">E-mail Cadastrado</label>
                                <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="seu.email@pr.senac.br" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">Senha</label>
                                <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-lg mt-2 transition flex justify-center items-center shadow-md">
                                {loading ? 'Verificando...' : 'Entrar no Sistema'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- ESTRUTURA DOS LEQUES DE CURSOS (APZ) ---
        const CURSOS_POR_MODALIDADE = {
            'Aperfeiçoamento': ['Administrativo', 'Administrativo (Sescoop)', 'Vendas', 'Supermercado'],
            'Técnica': ['Administrativo', 'ADM Sescoop']
        };

        const INITIAL_DB = [];

        const getSafeModalidade = (row) => {
            if (row.modalidade) {
                return normalizeText(row.modalidade).includes('tecnica') ? 'Técnica' : 'Aperfeiçoamento';
            }
            const cNorm = normalizeText(row.curso);
            if (cNorm.includes('tecnica') || cNorm.includes('empresas')) return 'Técnica';
            return 'Aperfeiçoamento';
        };

        class ErrorBoundary extends Component {
            constructor(props) { super(props); this.state = { hasError: false }; }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) { console.error("Crash UI:", error, errorInfo); }
            handleReset = () => { localStorage.clear(); window.location.reload(); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center min-h-screen bg-gray-50 p-4 text-center">
                            <h2 className="text-xl font-bold text-slate-800 mb-2">Sistema Indisponível</h2>
                            <p className="text-gray-500 mb-4 text-sm">Ocorreu um erro ao carregar os dados. Tente reiniciar.</p>
                            <button onClick={this.handleReset} className="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold shadow hover:bg-blue-700 transition">Reiniciar Aplicação</button>
                        </div>
                    );
                }
                return this.props.children;
            }

        const SUB_KEY = 'senacSubs_v45';

        const EXTRA_INSTRUCTORS_KEY = 'senacExtraInstructors_v1';
        const LAST_REBALANCE_KEY = 'senacLastRebalanceAt_v1';
        const LOCAL_TEST_MODE = window.SGT_LOCAL_TEST_MODE === true;
        
        // Blocklist
        const BLOCKED_INSTRUCTORS = ['fabio', 'lilian', 'luciano', 'claire'];
        
        // Whitelist Técnica
        const TECNICA_WHITELIST = ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia'];

        const normalizeText = (text) => {
            if (!text || typeof text !== 'string') return "";
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        const normalizeAutoAssignedLogs = (logs) => {
            if (!logs) return undefined;
            if (typeof logs === 'object' && !Array.isArray(logs)) return logs;
            if (typeof logs !== 'string') return undefined;

            const clean = logs.trim();
            if (!clean || clean === '{}' || clean === '[]') return undefined;

            try {
                const parsed = JSON.parse(clean);
                return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : undefined;
            } catch (e) {
                return undefined;
            }
        };

        const formatDatePTBR = (iso) => { const s = safeString(iso); if(!s) return ''; const p = s.split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : s; };

        const fmtDate = (val) => { 
            if (!val) return ''; 
            if (val instanceof Date) {
                const d = new Date(val.getTime() + Math.abs(val.getTimezoneOffset() * 60000));
                return d.toISOString().split('T')[0]; 
            }
            const s = safeString(val); 
            if (s.match(/^\d{2}\/\d{2}\/\d{4}$/)) { const [d, m, y] = s.split('/'); return `${y}-${m}-${d}`; } 
            if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.substring(0, 10);
            return s; 
        };

        const getMonthName = (yyyy_mm) => {
            if (!yyyy_mm) return '';
            const [y, m] = yyyy_mm.split('-');
            const months = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            return `${months[parseInt(m, 10) - 1]} de ${y}`;
        };

        function App({ user }) {
            // === ESTADOS ORIGINAIS DA APLICAÇÃO ===
            const [data, setData] = useState([]);
            const [substitutions, setSubstitutions] = useState([]);
            const [logs, setLogs] = useState([]);
            // Estado do Simulador de Equilíbrio (Instalado no lugar certo!)
            const [simulator, setSimulator] = useState({ isOpen: false, changes: [], newDb: [], scope: 'all', variationId: 0 });
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const [viewDate, setViewDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedInstructorDetail, setSelectedInstructorDetail] = useState(null);
            const [notification, setNotification] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [dashboardView, setDashboardView] = useState('instructors');
            const [reportType, setReportType] = useState('geral');
            const fileInputRef = useRef(null);
            const blockedCleanupRunningRef = useRef(false);

            const [filters, setFilters] = useState({ instrutor: '', analista: '', modalidade: '', curso: '', turma: '', dataTransferencia: '' });
            const [isFormOpen, setIsFormOpen] = useState(false);
            
            const [isNewInstModalOpen, setIsNewInstModalOpen] = useState(false);
            const [newInstData, setNewInstData] = useState({ name: '', isTecnica: false, selectedClasses: [] });

            const [tecnicaWhitelist, setTecnicaWhitelist] = useState(() => {
                try {
                    const saved = localStorage.getItem('senacWhitelist_v1');
                    return saved ? JSON.parse(saved) : ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia'];
                } catch(e) { return ['juliana', 'viviane', 'ana claudia', 'jean', 'tatiane', 'katia']; }
            });

            const [blockedInstructors, setBlockedInstructors] = useState(() => {
                try {
                    const saved = localStorage.getItem(BLOCK_KEY);
                    const savedList = saved ? JSON.parse(saved) : [];
                    return [...new Set([...BLOCKED_INSTRUCTORS, ...savedList].map(normalizeText).filter(Boolean))];
                } catch(e) {
                    return [...BLOCKED_INSTRUCTORS];
                }
            });

            const [extraInstructors, setExtraInstructors] = useState(() => {
                try {
                    const saved = localStorage.getItem(EXTRA_INSTRUCTORS_KEY);
                    const savedList = saved ? JSON.parse(saved) : [];
                    return Array.isArray(savedList) ? savedList.map(safeString).filter(Boolean) : [];
                } catch(e) {
                    return [];
                }
            });

            const toggleTecnicaPermission = (nome) => {
                const normName = normalizeText(nome);
                let newList;
                if (tecnicaWhitelist.includes(normName)) {
                    newList = tecnicaWhitelist.filter(n => n !== normName);
                } else {
                    newList = [...tecnicaWhitelist, normName];
                }
                setTecnicaWhitelist(newList);
                localStorage.setItem('senacWhitelist_v1', JSON.stringify(newList));
            };
            
            const [isSubModalOpen, setIsSubModalOpen] = useState(false);
            const [newSub, setNewSub] = useState({ 
                isDefinitive: false, dataInicio: '', dataFim: '', 
                turmaId: '', instrutorAusente: '', instrutorSubstituto: '', motivo: '' 
            });
            
            const [importSummaryModal, setImportSummaryModal] = useState(null);

            const [newClass, setNewClass] = useState({ id: '', modalidade: 'Aperfeiçoamento', curso: 'Administrativo', analista: '', alunos: '', inicio: '', termino: '', instrutor1: '', instrutor2: '', instrutor3: '', dataTransferencia: '', dataTransferencia2: '' });
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editingClass, setEditingClass] = useState(null);

            const [emailConfigModal, setEmailConfigModal] = useState(false);
            const [emailPeriod, setEmailPeriod] = useState({ start: '', end: '' });

            // === MODO TESTE LOCAL: carrega somente dados do navegador ===
            useEffect(() => {
                if (!user || !LOCAL_TEST_MODE) return;

                try {
                    const localData = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
                    const localSubs = JSON.parse(localStorage.getItem(SUB_KEY) || '[]');
                    const localLogs = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
                    const localBlocked = JSON.parse(localStorage.getItem(BLOCK_KEY) || '[]');
                    const localExtraInstructors = JSON.parse(localStorage.getItem(EXTRA_INSTRUCTORS_KEY) || '[]');

                    setData((Array.isArray(localData) ? localData : []).map(r => ({ ...r, modalidade: getSafeModalidade(r), autoAssignedLogs: normalizeAutoAssignedLogs(r.autoAssignedLogs) })));
                    setSubstitutions(Array.isArray(localSubs) ? localSubs : []);
                    setLogs(Array.isArray(localLogs) ? localLogs : []);
                    setExtraInstructors(Array.isArray(localExtraInstructors) ? localExtraInstructors.map(safeString).filter(Boolean) : []);

                    if (Array.isArray(localBlocked)) {
                        const mergedBlocked = [...new Set([...BLOCKED_INSTRUCTORS, ...localBlocked].map(normalizeText).filter(Boolean))];
                        setBlockedInstructors(mergedBlocked);
                        localStorage.setItem(BLOCK_KEY, JSON.stringify(mergedBlocked));
                    }

                    setLastSaved(new Date());
                } catch (e) {
                    console.error("Erro ao carregar dados locais: ", e);
                }
            }, [user]);

            // === 3. LÓGICA DO FIREBASE (Câmera ao Vivo) ===
            useEffect(() => {
                // Trava de Segurança: Só liga a câmera se o usuário estiver logado
                if (!user) return;
                if (LOCAL_TEST_MODE) return;
                if (!window.remoteDB || !window.dbMethods) return;

                const { doc, onSnapshot } = window.dbMethods;
                
                const unsub = onSnapshot(doc(window.remoteDB, "sgt", "dadosGerais"), (docSnap) => {
                    if (docSnap.exists()) {
                        const dbData = docSnap.data();
                        const parsedData = (dbData.data || []).map(r => ({...r, modalidade: getSafeModalidade(r), autoAssignedLogs: normalizeAutoAssignedLogs(r.autoAssignedLogs)}));
                        
                        setData(parsedData);
                        setLogs(dbData.logs || []);
                        setSubstitutions(dbData.substitutions || []);
                        if (Array.isArray(dbData.blockedInstructors)) {
                            const mergedBlocked = [...new Set([...BLOCKED_INSTRUCTORS, ...dbData.blockedInstructors].map(normalizeText).filter(Boolean))];
                            setBlockedInstructors(mergedBlocked);
                            localStorage.setItem(BLOCK_KEY, JSON.stringify(mergedBlocked));
                        }
                        if (Array.isArray(dbData.extraInstructors)) {
                            const cleanExtra = dbData.extraInstructors.map(safeString).filter(Boolean);
                            setExtraInstructors(cleanExtra);
                            localStorage.setItem(EXTRA_INSTRUCTORS_KEY, JSON.stringify(cleanExtra));
                        }
                    }
                }, (error) => {
                    console.error("Erro ao ler Firebase: ", error);
                    showNotify(`Firebase: falha ao ler dados (${error.code || 'erro'}). Confirme login e regras.`, "error");
                });

                return () => unsub();
            }, [user]);

            // === 4. FUNÇÃO PERSIST DEFINITIVA ===
            const persist = async (newData, newSubs, newLogs, nextBlockedInstructors = null) => {
                const blockedToSave = Array.isArray(nextBlockedInstructors) ? nextBlockedInstructors : blockedInstructors;
                const dataToSave = (Array.isArray(newData) ? newData : []).map(row => {
                    const logs = normalizeAutoAssignedLogs(row.autoAssignedLogs);
                    const normalizedRow = { ...row, modalidade: getSafeModalidade(row) };
                    if (logs && Object.keys(logs).length > 0) {
                        normalizedRow.autoAssignedLogs = logs;
                    } else {
                        delete normalizedRow.autoAssignedLogs;
                    }
                    return normalizedRow;
                });
                setIsSaving(true);
                
                setData(dataToSave);
                setSubstitutions(newSubs); 
                if(newLogs) setLogs(newLogs);
                
                localStorage.setItem(DB_KEY, JSON.stringify(dataToSave));
                localStorage.setItem(SUB_KEY, JSON.stringify(newSubs));
                if(newLogs) localStorage.setItem(LOG_KEY, JSON.stringify(newLogs));
                localStorage.setItem(BLOCK_KEY, JSON.stringify(blockedToSave));
                
                if (!LOCAL_TEST_MODE && window.remoteDB && window.dbMethods) {
                    try {
                        if (!window.auth || !window.auth.currentUser) {
                            throw new Error("Usuário não autenticado no Firebase Auth.");
                        }
                        const { doc, setDoc } = window.dbMethods;
                        await setDoc(doc(window.remoteDB, "sgt", "dadosGerais"), {
                            data: dataToSave,
                            logs: newLogs || logs,
                            substitutions: newSubs,
                            blockedInstructors: blockedToSave,
                            extraInstructors,
                            lastUpdate: new Date().toISOString()
                        });
                        console.log("🔥 Salvo no Firebase com sucesso!");
                    } catch (e) {
                        console.error("Erro ao salvar na nuvem: ", e);
                        showNotify(`Firebase: falha ao salvar (${e.code || e.message || 'erro'}).`, "error");
                    }
                } else if (LOCAL_TEST_MODE) {
                    console.log("Modo teste local ativo: salvo apenas no navegador.");
                }
                
                setLastSaved(new Date());
                setTimeout(() => setIsSaving(false), 500); 
            };            

            
          
            const addLog = (type, classId, before, after) => {
                const newLog = { id: Date.now(), timestamp: new Date().toISOString(), type, classId, before: typeof before === 'object' ? JSON.stringify(before) : safeString(before), after: typeof after === 'object' ? JSON.stringify(after) : safeString(after) };
                return [newLog, ...logs];
            };

            const showNotify = (msg, type = 'success') => {
                setNotification({ msg: safeString(msg), type });
                setTimeout(() => setNotification(null), 4000);
            };

            
            const handleOpenEdit = (classData) => {
                // Adicionamos o 'originalId' para o sistema lembrar qual era o número antes da edição
                setEditingClass({...classData, modalidade: getSafeModalidade(classData), originalId: classData.id});
                setIsEditModalOpen(true);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                if (!editingClass) return;
              
                // Confere se o novo número da turma já existe no sistema
                if (String(editingClass.id) !== String(editingClass.originalId)) {
                    const idExists = data.some(d => String(d.id) === String(editingClass.id));
                    if (idExists) {
                        showNotify("Erro: Já existe outra turma com este número no sistema!", "error");
                        return;
                    }
                }

                const duplicateInstructor = getDuplicateInstructorInClass(editingClass);
                if (duplicateInstructor) {
                    showNotify("Erro: o mesmo instrutor não pode ser Instrutor 1, 2 ou 3 na mesma turma.", "error");
                    return;
                }

                const oldData = data.find(d => String(d.id) === String(editingClass.originalId));
                const changes = [];
                if (oldData) {
                    if (oldData.id != editingClass.id) changes.push(`ID Turma: ${oldData.id} -> ${editingClass.id}`);
                    if (oldData.alunos != editingClass.alunos) changes.push(`Alunos: ${oldData.alunos} -> ${editingClass.alunos}`);
                    if (oldData.modalidade != editingClass.modalidade) changes.push(`APZ: ${oldData.modalidade || 'N/A'} -> ${editingClass.modalidade}`);
                    if (oldData.curso != editingClass.curso) changes.push(`Curso: ${oldData.curso} -> ${editingClass.curso}`);
                    if (oldData.instrutor1 != editingClass.instrutor1) changes.push(`Instrutor 1: ${oldData.instrutor1} -> ${editingClass.instrutor1}`);
                    if (oldData.instrutor2 != editingClass.instrutor2) changes.push(`Instrutor 2: ${oldData.instrutor2 || 'N/A'} -> ${editingClass.instrutor2}`);
                    if (oldData.instrutor3 != editingClass.instrutor3) changes.push(`Instrutor 3: ${oldData.instrutor3 || 'N/A'} -> ${editingClass.instrutor3}`);
                    if (oldData.dataTransferencia != editingClass.dataTransferencia) changes.push(`Passagem 1: ${formatDatePTBR(oldData.dataTransferencia)} -> ${formatDatePTBR(editingClass.dataTransferencia)}`);
                    if (oldData.dataTransferencia2 != editingClass.dataTransferencia2) changes.push(`Passagem 2: ${formatDatePTBR(oldData.dataTransferencia2)} -> ${formatDatePTBR(editingClass.dataTransferencia2)}`);
                }
              
                const newLogs = changes.length > 0 ? addLog("Edição", editingClass.id, "Dados Anteriores", changes.join('; ')) : logs;

                const newData = data.map(d => {
                    if (String(d.id) === String(editingClass.originalId)) {
                        const updated = { ...editingClass, alunos: parseInt(editingClass.alunos) || 0 };
                        delete updated.originalId; 
                        delete updated.autoAssignedLogs; 
                        return updated;
                    }
                    return d;
                });

                // Atualiza também as substituições vinculadas caso o número da turma mude
                let newSubs = substitutions;
                if (String(editingClass.id) !== String(editingClass.originalId)) {
                    newSubs = substitutions.map(sub => {
                        if (String(sub.turmaId) === String(editingClass.originalId)) {
                            return { ...sub, turmaId: editingClass.id };
                        }
                        return sub;
                    });
                }

                // Atualiza a tela (Estado Local)
                setData(newData);
                setSubstitutions(newSubs);
                setLogs(newLogs);

                // Salva na Nuvem (Firebase)
                persist(newData, newSubs, newLogs);

                showNotify(`Turma ${editingClass.id} atualizada com sucesso!`, "success");
                setIsEditModalOpen(false);
                setEditingClass(null);
            };
// --- INÍCIO DO PASSO 2: FUNÇÃO PARA EXCLUIR TURMA ---
            const handleDeleteClass = (id) => {
                if (confirm(`⚠️ ATENÇÃO: Deseja EXCLUIR a turma ${id} permanentemente?`)) {
                    // 1. Filtra os dados removendo a turma
                    const newData = data.filter(d => String(d.id) !== String(id));
                    const newSubs = substitutions.filter(sub => String(sub.turmaId) !== String(id));
                    
                    // 2. Gera o Log
                    const newLogs = addLog("Exclusão", id, `Turma ${id}`, "Turma removida via lixeira");

                    // 3. Atualiza os estados locais (para sumir da tela na hora)
                    setData(newData);
                    setSubstitutions(newSubs);
                    setLogs(newLogs);

                    // 4. Salva no Firebase/Nuvem
                    persist(newData, newSubs, newLogs);
                    
                    showNotify(`Turma ${id} excluída com sucesso!`, "success");
                }
            };
const handleClearAllData = () => {
                const badge = prompt("⚠️ ÁREA CRÍTICA: Para APAGAR TODO O BANCO DE DADOS, digite seu número de CRACHÁ:");
                
                if (!badge || badge.trim() === "") {
                    showNotify("Operação cancelada. Crachá necessário.", "error");
                    return;
                }

                if (confirm("VOCÊ TEM CERTEZA? Isso apagará todas as turmas, substituições e históricos permanentemente.")) {
                    const emptyData = [];
                    const emptySubs = [];
                    const finalLogs = addLog("LIMPEZA TOTAL", "SISTEMA", `Crachá: ${badge}`, "O usuário resetou o banco de dados completo.");

                    // Limpa tudo localmente
                    setData(emptyData);
                    setSubstitutions(emptySubs);
                    setLogs(finalLogs);

                    // Limpa na nuvem (Firebase)
                    persist(emptyData, emptySubs, finalLogs);

                    showNotify("O banco de dados foi zerado com sucesso!", "success");
                }
            };
            // --- FIM DO PASSO 2 ---

            const canonicalNameMap = useMemo(() => {
                const map = {};
                const allNames = [...data.flatMap(d => [d.instrutor1, d.instrutor2, d.instrutor3, d.analista]), ...extraInstructors];
                allNames.forEach(name => {
                    const sName = safeString(name);
                    if(!sName) return;
                    const key = normalizeText(sName);
                    if (!map[key]) map[key] = sName;
                });
                return map;
            }, [data, extraInstructors]);

            const getCanonical = (name) => {
                const sName = safeString(name);
                if (!sName) return '';
                return canonicalNameMap[normalizeText(sName)] || sName;
            };

            const getClassInstructorRoles = (turma) => {
                return getSafeModalidade(turma) === 'Técnica' || safeString(turma.instrutor3) || safeString(turma.dataTransferencia2)
                    ? ['instrutor1', 'instrutor2', 'instrutor3']
                    : ['instrutor1', 'instrutor2'];
            };

            const getDuplicateInstructorInClass = (turma) => {
                const seen = {};
                const roles = getClassInstructorRoles(turma);

                for (const role of roles) {
                    const norm = normalizeText(turma[role]);
                    if (!norm) continue;
                    if (seen[norm]) {
                        return { nome: turma[role], firstRole: seen[norm], secondRole: role };
                    }
                    seen[norm] = role;
                }

                return null;
            };

            const uniqueInstrutores = useMemo(() => {
                const raw = [...data.flatMap(d => [d.instrutor1, d.instrutor2, d.instrutor3]), ...extraInstructors].map(safeString).filter(Boolean);
                return [...new Set(raw.map(n => getCanonical(n)))]
                    .filter(n => !blockedInstructors.includes(normalizeText(n)))
                    .sort();
            }, [data, extraInstructors, canonicalNameMap, blockedInstructors]);

            const uniqueAnalistas = useMemo(() => {
                const raw = data.map(d => safeString(d.analista)).filter(Boolean);
                return [...new Set(raw.map(n => getCanonical(n)))].sort();
            }, [data, canonicalNameMap]);

            const uniqueCursos = useMemo(() => {
                const dbCursos = [...new Set(data.map(d => safeString(d.curso)).filter(Boolean))];
                return dbCursos.sort();
            }, [data]);
            
            const uniqueModalidades = ['Aperfeiçoamento', 'Técnica'];
            const uniqueClasses = useMemo(() => [...new Set(data.map(d => safeString(d.id)).filter(Boolean))].sort(), [data]);
            const uniqueDates = useMemo(() => [...new Set(data.map(d => safeString(d.dataTransferencia)).filter(Boolean))].sort(), [data]);

            const getActiveInfoOnDate = (row, dateObj) => {
                if (!dateObj || isNaN(dateObj.getTime())) return { inst: null, status: 'Desconhecido' };
                
                const start = (row.inicio && row.inicio.length === 10) ? new Date(row.inicio + 'T00:00:00') : new Date('1970-01-01T00:00:00');
                const end = (row.termino && row.termino.length === 10) ? new Date(row.termino + 'T00:00:00') : null;

                if (dateObj < start) return { inst: null, status: 'Agendado' };
                if (end && dateObj > end) return { inst: null, status: 'Finalizado' };

                let currentInst = safeString(row.instrutor1);
                let status = 'Ativo';

                let events = [];
                if (row.instrutor2 && safeString(row.dataTransferencia).length === 10) {
                    events.push({ d: new Date(row.dataTransferencia + 'T00:00:00'), inst: row.instrutor2, tag: 'Transferido (P1)' });
                }
                if (getSafeModalidade(row) === 'Técnica' && row.instrutor3 && safeString(row.dataTransferencia2).length === 10) {
                    events.push({ d: new Date(row.dataTransferencia2 + 'T00:00:00'), inst: row.instrutor3, tag: 'Transferido (P2)' });
                }
                events.sort((a,b) => a.d - b.d);

                events.forEach(ev => {
                    if (dateObj >= ev.d) {
                        currentInst = safeString(ev.inst);
                        status = ev.tag;
                    }
                });
                return { inst: getCanonical(currentInst), status };
            };

            const processedData = useMemo(() => {
                const target = new Date(viewDate + 'T00:00:00');
                return data.map(row => {
                    const info = getActiveInfoOnDate(row, target);
                    return { ...row, instrutorAtual: info.inst, status: info.status, modalidade: getSafeModalidade(row), autoAssignedLogs: normalizeAutoAssignedLogs(row.autoAssignedLogs) };
                });
            }, [data, viewDate, canonicalNameMap]);

            // NOVO: Agrupamento de Turmas Ativas para o Modal de Onboarding
            const groupedActiveClassesForOnboarding = useMemo(() => {
                const targetDateObj = new Date(viewDate + 'T00:00:00');
                const actives = processedData.filter(c => c.status !== 'Finalizado' && c.status !== 'Agendado');
                
                const groups = {};
                actives.forEach(cls => {
                    const key = `${cls.curso} (${cls.modalidade})`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(cls);
                });
                return groups;
            }, [processedData, viewDate]);

            // NOVO: Lógica para incluir e transferir em lote para Novo Instrutor
            const handleOnboardInstructor = (e) => {
                e.preventDefault();
                const cleanName = safeString(newInstData.name).trim();
                if (!cleanName) { showNotify("Digite o nome do instrutor.", "error"); return; }

                const nextExtraInstructors = [...new Set([...extraInstructors, cleanName].map(safeString).filter(Boolean))];
                setExtraInstructors(nextExtraInstructors);
                localStorage.setItem(EXTRA_INSTRUCTORS_KEY, JSON.stringify(nextExtraInstructors));
                
                // Salva a permissão da técnica permanentemente no sistema
                if (newInstData.isTecnica) {
                    const normName = normalizeText(cleanName);
                    if (!tecnicaWhitelist.includes(normName)) {
                        const updatedList = [...tecnicaWhitelist, normName];
                        setTecnicaWhitelist(updatedList);
                        localStorage.setItem('senacWhitelist_v1', JSON.stringify(updatedList));
                    }
                }

                if (newInstData.selectedClasses.length === 0) {
                    showNotify(`Instrutor(a) ${cleanName} habilitado(a). Ele(a) já entra no próximo Equilibrar Turmas.`);
                    setIsNewInstModalOpen(false);
                    setNewInstData({ name: '', isTecnica: false, selectedClasses: [] });
                    return; 
                }

                const targetDateObj = new Date(viewDate + 'T00:00:00');
                let changesLog = [];
                
                const newData = data.map(d => {
                    if (newInstData.selectedClasses.includes(d.id)) {
                        let updated = { ...d };
                        const info = getActiveInfoOnDate(updated, targetDateObj);
                        const activeInst = getCanonical(info.inst);
                        let roleToUpdate = '';
                        
                        if (activeInst) {
                            if (getCanonical(updated.instrutor1) === activeInst) roleToUpdate = 'instrutor1';
                            if (getCanonical(updated.instrutor2) === activeInst) roleToUpdate = 'instrutor2';
                            if (getCanonical(updated.instrutor3) === activeInst) roleToUpdate = 'instrutor3';
                        } else {
                            roleToUpdate = 'instrutor1';
                        }

                        const alreadyInOtherRole = getClassInstructorRoles(updated)
                            .filter(role => role !== roleToUpdate)
                            .some(role => normalizeText(updated[role]) === normalizeText(cleanName));

                        if (alreadyInOtherRole) {
                            changesLog.push(`${updated.id} (${updated.curso}) não alterada: ${cleanName} já está em outro papel da turma`);
                            return updated;
                        }

                        updated[roleToUpdate] = cleanName;
                        changesLog.push(`${updated.id} (${updated.curso}) repassada para ${cleanName}`);
                        return updated;
                    }
                    return d;
                });

                const newLogs = addLog("Onboarding de Instrutor", "Lote", "Múltiplas", changesLog.join(' | '));
                persist(newData, substitutions, newLogs);
                
                showNotify(`Sucesso! ${cleanName} cadastrado(a) e incluído(a) no equilíbrio automático.`);
                setIsNewInstModalOpen(false);
                setNewInstData({ name: '', isTecnica: false, selectedClasses: [] });
            };

         
            const filteredRows = useMemo(() => processedData.filter(row => {
                if (row.status === 'Finalizado') return false;
                
                // Filtros originais
                const matchAnalista = filters.analista === '' || row.analista === filters.analista;
                const matchModalidade = filters.modalidade === '' || row.modalidade === filters.modalidade;
                const matchCurso = filters.curso === '' || row.curso === filters.curso;
                const matchDate = filters.dataTransferencia === '' || row.dataTransferencia === filters.dataTransferencia;
                const matchId = filters.turma === '' || safeString(row.id).includes(filters.turma);
                
                // NOVO: Filtros de Data de Início e Término
                const rowInicio = fmtDate(row.inicio || row.dataInicio);
                const rowFim = fmtDate(row.termino || row.dataFim);
                
                const matchDataInicio = !filters.dataInicio || (rowInicio && rowInicio >= filters.dataInicio);
                const matchDataFim = !filters.dataFim || (rowFim && rowFim <= filters.dataFim);

                // O sistema agora exige que as datas também batam!
                return matchAnalista && matchModalidade && matchCurso && matchDate && matchId && matchDataInicio && matchDataFim;
            }), [processedData, filters]);

            const filteredReportData = useMemo(() => {
                if (reportType === 'logs') return logs;
                if (reportType === 'subs') return substitutions;
                return filteredRows;
            }, [reportType, logs, substitutions, filteredRows]);

            // NOVO: Função para Exportar para Excel com as datas em Dia/Mês/Ano
